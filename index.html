<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroGuard | AI Platform Safety</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        :root {
            --accent: #ffcc00;
            --danger: #ff4444;
            --safe: #00c851;
            --bg: #121212;
            --panel: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 350px;
            background: var(--panel);
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .status-card {
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 2px solid #444;
        }

        .status-safe { background: rgba(0, 200, 81, 0.2); color: var(--safe); border-color: var(--safe); }
        .status-breach { background: rgba(255, 68, 68, 0.2); color: var(--danger); border-color: var(--danger); }

        .control-group { margin-bottom: 15px; background: #2a2a2a; padding: 10px; border-radius: 5px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        select, button {
            width: 100%; padding: 10px; background: #333; color: white; border: 1px solid #444; border-radius: 4px; cursor: pointer;
        }

        #start-btn { background: var(--accent); color: black; font-weight: bold; margin-top: 10px; }
        #start-btn.active { background: var(--danger); color: white; }

        #viewport {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* Essential for visibility */
        video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); /* Mirror for natural feel */
        }
        canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 10;
            transform: scaleX(-1);
        }

        #fine-tab {
            width: 300px;
            background: var(--panel);
            border-left: 2px solid #333;
            padding: 15px;
            overflow-y: auto;
        }

        .fine-card {
            background: #2a2a2a;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
        }

        .fine-card img { width: 100%; border-radius: 3px; margin-bottom: 5px; }
        .fine-actions { display: flex; gap: 5px; margin-top: 5px; }
        .btn-small { padding: 5px; font-size: 10px; flex: 1; }

        /* --- NEW CSS ADDITIONS (NOTHING REMOVED) --- */
        .reg-input { margin-bottom: 8px; font-size: 12px; }
        .angle-btn { background: #444; margin: 2px; font-size: 10px; width: 45%; }
        .angle-btn.success { background: var(--safe); }
        .tab-btn { background: #333; border: 1px solid #555; width: 50%; }
        .active-tab { background: var(--accent) !important; color: black !important; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="display: flex; gap: 5px; margin-bottom: 15px;">
            <button id="t1" class="tab-btn active-tab" onclick="switchUI('monitor')">Monitoring</button>
            <button id="t2" class="tab-btn" onclick="switchUI('register')">Registration</button>
        </div>

        <div id="monitor-ui">
            <h2>METRO GUARD AI</h2>
            <div id="status-display" class="status-card status-safe">SYSTEM READY</div>

            <div class="control-group">
                <label>Points on Yellow Line (2-10)</label>
                <input type="number" id="point-count" min="2" max="10" value="3">
            </div>

            <div class="control-group">
                <label>Safe Side Orientation</label>
                <select id="safe-side">
                    <option value="left">Left of Line</option>
                    <option value="right">Right of Line</option>
                </select>
            </div>

            <div id="slider-container"></div>
            <button id="start-btn">LOCK & START MONITORING</button>
        </div>

        <div id="register-ui" style="display:none;">
            <h2>USER REGISTRATION</h2>
            <div class="control-group">
                <input type="text" id="reg-name" placeholder="Name" class="reg-input">
                <input type="text" id="reg-mobile" placeholder="Mobile" class="reg-input">
                <div style="display:flex; gap:5px;">
                    <input type="text" id="reg-rfid" placeholder="RFID" class="reg-input">
                    <button style="width:40px; padding:2px;" onclick="readRFID()">🔌</button>
                </div>
                <label>Capture 4 Different Angles:</label>
                <div style="display:flex; flex-wrap:wrap; justify-content:center;">
                    <button class="angle-btn" id="a0" onclick="captureAngle(0)">FRONT</button>
                    <button class="angle-btn" id="a1" onclick="captureAngle(1)">LEFT</button>
                    <button class="angle-btn" id="a2" onclick="captureAngle(2)">RIGHT</button>
                    <button class="angle-btn" id="a3" onclick="captureAngle(3)">UP</button>
                </div>
            </div>
            <button onclick="saveRegistration()" style="background:var(--safe)">SAVE DATA</button>
        </div>
    </div>

    <div id="viewport">
        <video id="input-video" autoplay muted playsinline></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <div id="fine-tab">
        <h3>Violation Logs</h3>
        <div id="violation-list"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const sliderContainer = document.getElementById('slider-container');
        const pointCountInput = document.getElementById('point-count');
        const startBtn = document.getElementById('start-btn');
        const statusDisplay = document.getElementById('status-display');
        const violationList = document.getElementById('violation-list');

        let isMonitoring = false;
        let linePoints = [];
        let breachStartTime = null;
        const BREACH_THRESHOLD = 1500; 

        // --- CORE UI & POSE LOGIC ---
        function updateSliders() {
            if (isMonitoring) return;
            sliderContainer.innerHTML = '';
            linePoints = [];
            const count = parseInt(pointCountInput.value);
            for (let i = 0; i < count; i++) {
                const x = (i / (count - 1)) * 100;
                const y = 80;
                linePoints.push({ x, y });
                const div = document.createElement('div');
                div.className = 'control-group';
                div.innerHTML = `<label>Point ${i+1}</label>
                                 <input type="range" data-idx="${i}" data-axis="x" value="${x}">
                                 <input type="range" data-idx="${i}" data-axis="y" value="${y}">`;
                sliderContainer.appendChild(div);
            }
        }

        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

        pose.onResults((results) => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Only show monitoring visuals if the Monitor tab is active
            if (document.getElementById('monitor-ui').style.display !== 'none') {
                drawYellowLine();
                if (results.poseLandmarks && isMonitoring) {
                    processBreach(results.poseLandmarks);
                }
            }
            canvasCtx.restore();
        });

        function drawYellowLine() {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = 'yellow';
            canvasCtx.lineWidth = 8;
            linePoints.forEach((p, i) => {
                const cx = (p.x / 100) * canvasElement.width;
                const cy = (p.y / 100) * canvasElement.height;
                if (i === 0) canvasCtx.moveTo(cx, cy); else canvasCtx.lineTo(cx, cy);
            });
            canvasCtx.stroke();
        }

        // --- FACE API & ENFORCEMENT LOGIC ---
        let capturedDescriptors = [];
        async function loadModels() {
            const URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(URL);
            console.log("AI Models Loaded");
        }
        loadModels();

        function switchUI(mode) {
            document.getElementById('monitor-ui').style.display = mode === 'monitor' ? 'block' : 'none';
            document.getElementById('register-ui').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('t1').classList.toggle('active-tab', mode === 'monitor');
            document.getElementById('t2').classList.toggle('active-tab', mode === 'register');
        }

        // Registration: Capture face with angle uniqueness check
        async function captureAngle(idx) {
            const det = await faceapi.detectSingleFace(videoElement).withFaceLandmarks().withFaceDescriptor();
            if (!det) return alert("Face not found!");

            // Check against previously captured angles for this session
            for (let existing of capturedDescriptors) {
                if (existing) {
                    const dist = faceapi.euclideanDistance(det.descriptor, existing);
                    if (dist < 0.25) { // Threshold for "too similar"
                        return alert("Error: Angle too similar to previous capture! Please turn your head more.");
                    }
                }
            }

            capturedDescriptors[idx] = det.descriptor;
            document.getElementById(`a${idx}`).classList.add('success');
            document.getElementById(`a${idx}`).innerText = "✓ CAPTURED";
        }

        function saveRegistration() {
            const rfid = document.getElementById('reg-rfid').value || "RFID-" + Math.floor(Math.random()*10000);
            if (capturedDescriptors.filter(d => d).length < 4) return alert("Please capture all 4 angles!");
            
            const userData = {
                name: document.getElementById('reg-name').value,
                mobile: document.getElementById('reg-mobile').value,
                descriptors: capturedDescriptors.map(d => Array.from(d)) // Store all 4 angles
            };
            
            localStorage.setItem(rfid, JSON.stringify(userData));
            alert(`User Registered Successfully!\nAssigned RFID: ${rfid}`);
            location.reload();
        }

        // JUDGEMENT: Auto-identify person from violation image
        async function verifyFine(imgUrl) {
            const img = await faceapi.fetchImage(imgUrl);
            const breachDet = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
            
            if (!breachDet) return alert("Face not clear enough in violation capture.");

            let bestMatch = { score: 0, rfid: null, data: null };

            // Loop through all registered users in LocalStorage
            for (let i = 0; i < localStorage.length; i++) {
                const rfid = localStorage.key(i);
                const user = JSON.parse(localStorage.getItem(rfid));
                
                // Compare breach face against all 4 saved angles of this user
                user.descriptors.forEach(descArray => {
                    const savedDescriptor = new Float32Array(descArray);
                    const distance = faceapi.euclideanDistance(breachDet.descriptor, savedDescriptor);
                    const matchScore = (1 - distance) * 100;

                    if (matchScore > bestMatch.score) {
                        bestMatch = { score: matchScore, rfid: rfid, data: user };
                    }
                });
            }

            if (bestMatch.score >= 85) {
                const confirmFine = confirm(`MATCH FOUND (${bestMatch.score.toFixed(1)}%)\nName: ${bestMatch.data.name}\nRFID: ${bestMatch.rfid}\n\nCharge fine and send SMS?`);
                if (confirmFine) {
                    alert("Fine Processed. SMS Sent via API.");
                    window.open(`https://wa.me/91${bestMatch.data.mobile}?text=MetroGuard: Breach confirmed for ${bestMatch.data.name}. Fine generated.`, '_blank');
                }
            } else {
                alert(`NO CONFIDENT MATCH. Highest probability: ${bestMatch.score.toFixed(1)}%. Manual intervention required.`);
            }
        }

        // Camera startup
        async function startCamera() {
            const camera = new Camera(videoElement, {
                onFrame: async () => { await pose.send({image: videoElement}); },
                width: 1280, height: 720
            });
            camera.start();
        }
        startCamera();
        updateSliders();
    </script>
</body>
</html>
