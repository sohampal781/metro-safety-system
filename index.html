<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroGuard ultra Pro | Safety Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        :root {
            --accent: #00d2ff;
            --danger: #ff3333;
            --success: #00e676;
            --bg: #0a0b10;
            --panel: #161b22;
            --border: #30363d;
            --police-blue: #1a237e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #e6edf3;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 380px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            z-index: 100;
        }

        .tabs {
            display: flex;
            background: #0d1117;
            padding: 10px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }

        .content-area { padding: 20px; overflow-y: auto; flex-grow: 1; }

        /* --- UI COMPONENTS --- */
        .status-card {
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            text-transform: uppercase;
        }

        .status-safe { background: rgba(0, 230, 118, 0.1); color: var(--success); border-color: var(--success); }
        .status-breach { background: rgba(255, 51, 51, 0.1); color: var(--danger); border-color: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .control-group { 
            background: #0d1117; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border);
        }

        label { font-size: 11px; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 8px; }

        input, select, button {
            width: 100%; box-sizing: border-box; padding: 12px; background: #161b22; 
            border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 14px;
        }

        .action-btn {
            background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; margin-top: 10px;
        }

        .delete-btn {
            background: #ff4444; color: white; font-size: 10px; padding: 5px; margin-top: 5px; border: none; border-radius: 4px; cursor: pointer;
        }

        /* --- VIEWPORT --- */
        #viewport {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, canvas {
            position: absolute;
            width: 95%; height: 90%;
            object-fit: contain;
            border-radius: 12px;
            transform: scaleX(-1);
        }

        /* --- CHALLAN TAB OVERLAY --- */
        #challan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 500;
            display: none;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .challan-header {
            border-bottom: 2px solid var(--police-blue);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .challan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .challan-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            border-top: 5px solid var(--danger);
        }

        .challan-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }

        .angle-status {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;
        }
        .angle-box {
            padding: 8px; font-size: 10px; text-align: center; background: #21262d; border-radius: 4px;
        }
        .angle-box.done { background: var(--success); color: black; }
        /* Make the sidebar container flexible but restricted */
#sidebar {
    display: flex;
    flex-direction: column;
    height: 100vh; /* Lock sidebar to screen height */
}

/* Create a scrollable wrapper for the sliders */
#monitor-ui {
    flex-grow: 1;
    overflow-y: auto; /* Enable vertical scrolling */
    padding-right: 10px; /* Space for the scrollbar */
}

/* Custom Scrollbar Styling (Modern look) */
#monitor-ui::-webkit-scrollbar {
    width: 6px;
}

#monitor-ui::-webkit-scrollbar-track {
    background: #0d1117;
}

#monitor-ui::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 10px;
}

#monitor-ui::-webkit-scrollbar-thumb:hover {
    background: #00b8e6;
}
        #register-ui {
    padding: 20px;
    background: #0d1117;
    border-radius: 15px;
    border: 1px solid var(--accent);
}

.registration-header {
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 20px;
    text-align: center;
    border-bottom: 1px solid #30363d;
    padding-bottom: 10px;
}

#db-items div {
    background: #1c2128;
    margin-top: 5px;
    padding: 10px;
    border-radius: 5px;
    border-left: 3px solid var(--accent);
}
    </style>
</head>
<body>

    <div id="sidebar">
    <div class="tabs" style="display:flex; gap:5px; margin-bottom:15px;">
        <button onclick="switchUI('monitor')" class="tab-btn active" id="tab-mon">MONITOR</button>
        <button onclick="switchUI('register')" class="tab-btn" id="tab-reg">REGISTER</button>
        <button onclick="switchUI('challan')" class="tab-btn" id="tab-cha">PORTAL</button>
    </div>

    <div id="status-display" class="status-card status-safe">SYSTEM READY</div>

    <div id="monitor-ui">
        <div class="control-group">
            <label>Points on Yellow Line (2-10)</label>
            <input type="number" id="point-count" min="2" max="10" value="3">
        </div>
        <div class="control-group">
            <label>Safe Side Orientation</label>
            <select id="safe-side">
                <option value="left">Left of Line</option>
                <option value="right">Right of Line</option>
            </select>
        </div>
        <div id="slider-container"></div>
        <button id="start-btn">LOCK & START MONITORING</button>
    </div>

    <div id="register-ui" style="display:none;">
    <div class="control-group">
        <label>User Identification</label>
        <input type="text" id="reg-name" placeholder="Full Name">
        
        <button class="action-btn" onclick="lookupUser()" style="background:#30363d; font-size:10px; margin-bottom:10px;">SEARCH EXISTING USER</button>
        
        <label>Contact (Automatic SMS Target)</label>
        <input type="text" id="reg-mobile" placeholder="Mobile Number">
    </div>
    
    <button class="action-btn" onclick="startSecureCapture()">START NEW CAPTURE</button>
    <button class="action-btn" onclick="saveRegistration()" style="background:var(--success); margin-top:10px;">SAVE / UPDATE ENROLLMENT</button>
    <div id="db-items" style="margin-top:15px; font-size:11px;"></div>
</div>
</div>

    <div id="viewport">
        <video id="input-video" autoplay muted playsinline></video>
        <canvas id="output-canvas"></canvas>

        <div id="challan-overlay">
            <div class="challan-header">
                <h1>KOLKATA METRO RAILWAY E-CHALLAN SYSTEM</h1>
                <button class="action-btn" style="width:100px; margin:0;" onclick="switchUI('monitor')">CLOSE</button>
            </div>
            <div id="challan-grid" class="challan-grid"></div>
        </div>
    </div>

    <div id="fine-tab" style="display:none;">
        <h4 style="margin-top:0; color: var(--accent);">VIOLATION FEED</h4>
        <div id="violation-list"></div>
    </div>
   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCPixQatVPa326_yGej41aD9p5Z5Fyt3Lg",
        authDomain: "kolkata-metro-fine.firebaseapp.com",
        databaseURL: "https://kolkata-metro-fine-default-rtdb.firebaseio.com",
        projectId: "kolkata-metro-fine",
        storageBucket: "kolkata-metro-fine.firebasestorage.app",
        messagingSenderId: "835007350697",
        appId: "1:835007350697:web:8f359ed3fd8c0805ea66b8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    // --- 1. CORE SYSTEM VARIABLES ---
    const videoElement = document.getElementById('input-video');
    const canvasElement = document.getElementById('output-canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const sliderContainer = document.getElementById('slider-container');
    const pointCountInput = document.getElementById('point-count');
    const startBtn = document.getElementById('start-btn');
    const statusDisplay = document.getElementById('status-display');
    const violationList = document.getElementById('violation-list');

    let isMonitoring = false;
    let linePoints = [];
    let breachStartTime = null;
    const BREACH_THRESHOLD = 1500; 

    // Enrollment & Capture State
    let isCapturing = false;
    let captureStep = 0;
    let capturedDescriptors = [];
    let tempCapturedImages = [];
    const commands = ["LOOK STRAIGHT (FRONT)", "TURN HEAD LEFT", "TURN HEAD RIGHT", "LOOK UP / DOWN"];

    function switchUI(mode) {
    // Hide all main UI sections
    document.getElementById('monitor-ui').style.display = mode === 'monitor' ? 'block' : 'none';
    document.getElementById('register-ui').style.display = mode === 'register' ? 'block' : 'none';
    document.getElementById('challan-overlay').style.display = mode === 'challan' ? 'block' : 'none';
    
    // Toggle active state on buttons
    document.getElementById('tab-mon').classList.toggle('active', mode === 'monitor');
    document.getElementById('tab-reg').classList.toggle('active', mode === 'register');
    document.getElementById('tab-cha').classList.toggle('active', mode === 'challan');
    
    // Refresh lists
    if(mode === 'challan') renderChallans();
    if(mode === 'register') renderUserList();
}
async function judgeViolation(key) {
    currentActiveViolationKey = key; 
    const violData = JSON.parse(localStorage.getItem(key));
    
    document.getElementById('judgement-modal').style.display = 'block';
    document.getElementById('modal-violation-img').src = violData.img;
    
    const rfidInput = document.getElementById('manual-rfid-input');
    const aiPred = document.getElementById('ai-prediction');

    // Automatic Linkage: If AI found an RFID during the breach, auto-fill it
    if (violData.linkedRfid && violData.linkedRfid !== "UNKNOWN_ID") {
        rfidInput.value = violData.linkedRfid;
        aiPred.innerHTML = `<span style="color:var(--success)">USER IDENTIFIED: ${violData.linkedRfid}</span>`;
        fetchRegistrationData(); // This auto-populates the name/mobile display
    } else {
        rfidInput.value = "";
        aiPred.innerHTML = `<span style="color:var(--danger)">MANUAL VERIFICATION REQUIRED</span>`;
    }
}
       function fetchRegistrationData() {
    const inputRfid = document.getElementById('manual-rfid-input').value.trim();
    const userRaw = localStorage.getItem(inputRfid);
    
    if (!userRaw) {
        alert("RFID NOT REGISTERED");
        return;
    }

    const user = JSON.parse(userRaw);
    const display = document.getElementById('registration-display');
    const grid = document.getElementById('reg-photos-grid');
    
    display.style.display = 'block';
    // Show the first photo taken during registration
    grid.innerHTML = `
        <div style="text-align:center">
            <label style="color:var(--success)">OFFICIAL REGISTRATION PHOTO</label>
            <img src="${user.regImages[0]}" style="width:100%; border:3px solid var(--success); border-radius:10px; margin-top:5px;">
        </div>
    `;
    document.getElementById('reg-user-info').innerHTML = `
        <h3 style="margin:10px 0 5px 0">${user.name}</h3>
        <p style="color:var(--accent)">PH: ${user.mobile}</p>
    `;
}
        function loadDashboardData() {
    // This ensures that even after a refresh, the UI is populated
    renderChallans();   // Refresh the Violation Portal
    renderUserList();   // Refresh the Registered User List
    console.log("System Data Restored from LocalStorage");
}
window.finalizeFine = async function() {
        const rfid = document.getElementById('manual-rfid-input').value.trim();
        const amount = prompt("ENTER FINE AMOUNT (₹):", "1000"); // Master sets amount
        
        if (!amount || isNaN(amount)) return alert("Invalid Amount");

        // Find user in Firebase to get mobile
        onValue(ref(db, 'users/' + rfid), async (snapshot) => {
            const user = snapshot.val();
            if (!user) return alert("RFID NOT FOUND");

            const challanNo = "MG" + Date.now().toString().slice(-8);
            const fineMsg = `Kolkata Metro Railway Challan No: ${challanNo} Station: Central Metro Offence: Crossing platform safety line Penalty: ₹${amount} NOTICE: Please pay the fine to the Station Master within 7 days, otherwise legal action will be taken under Metro Railway safety regulations.`;

            // Update violation status in Firebase
            if (currentActiveViolationKey) {
                await update(ref(db, 'violations/' + currentActiveViolationKey), {
                    status: "FINED",
                    fineAmount: amount,
                    challanNo: challanNo
                });
                
                await sendKolkataSMS(user.mobile, fineMsg);
                alert("CHALLAN ISSUED & SMS SENT");
                closeJudgement();
            }
        }, { onlyOnce: true });
    }
       window.markAsPaid = async function(violationKey) {
        if(confirm("Confirm Payment? This record will be deleted from the server.")) {
            await remove(ref(db, 'violations/' + violationKey));
            alert("PAYMENT RECEIVED. RECORD DELETED.");
        }
    }
       onValue(ref(db, 'violations'), (snapshot) => {
        const data = snapshot.val();
        renderChallans(data);
    });

// Optimized Gateway Function
async function sendFastSMS(mobileNumber, fullChallanBody) {
    const apiKey = "HzZRzYz09iEIB7Glr3OmdOgt3PMocm66xPHcXWoaUvMaN9UKvlinysQDafuD";
    
    // Note: Using 'route=q' for Quick delivery. 
    // Ensure the message body is URI encoded to handle the newlines (\n)
    const url = `https://www.fast2sms.com/dev/bulkV2?authorization=${apiKey}&route=q&message=${encodeURIComponent(fullChallanBody)}&numbers=${mobileNumber}`;

    try {
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.return === true) {
            console.log("SMS Sent Successfully:", result.request_id);
            return true;
        } else {
            console.error("Gateway Error:", result.message);
            return false;
        }
    } catch (error) {
        console.error("Network Exception:", error);
        return false;
    }
}       
function closeJudgement() {
    document.getElementById('judgement-modal').style.display = 'none';
    document.getElementById('registration-display').style.display = 'none';
}
        function deleteRecord(key) {
    // 1. Force a confirmation dialog to prevent accidental clicks
    const confirmation = confirm("CRITICAL: Are you sure you want to permanently delete this record? This cannot be undone.");

    if (confirmation) {
        // 2. Remove the specific item from LocalStorage
        localStorage.removeItem(key);

        // 3. Update the UI instantly depending on what was deleted
        if (key.startsWith("VIOL-")) {
            renderChallans(); // Refresh the Portal view
        } else if (key.startsWith("METRO-")) {
            renderUserList(); // Refresh the Registration view
        }
        
        console.log(`Record ${key} deleted successfully.`);
    } else {
        console.log("Deletion cancelled by user.");
    }
}
       function renderChallans() {
    const grid = document.getElementById('challan-grid');
    if (!grid) return;
    grid.innerHTML = "";

    Object.keys(localStorage).forEach(key => {
        if(key.startsWith("VIOL-")) {
            const viol = JSON.parse(localStorage.getItem(key));
            const card = document.createElement('div');
            card.className = 'challan-card';
            
            // LOGIC: Check if this specific incident is already processed
            const isAlreadyFined = (viol.status === "FINED");

            card.innerHTML = `
    <img src="${viol.img}" style="width:100%; border-radius:8px; border: 2px solid ${isAlreadyFined ? '#00e676' : '#ff3333'}">
    
    <div style="font-size:12px; margin: 10px 0;">
        <b style="color:var(--accent)">RFID: ${viol.linkedRfid}</b><br>
        <span style="color:#8b949e">Time: ${viol.time}</span>
        
        ${isAlreadyFined ? `
            <div style="margin-top:8px; padding:8px; background:rgba(0,210,255,0.1); border-radius:4px; border:1px solid var(--accent);">
                <b style="color:var(--accent); font-size:10px;">CHALLAN: ${viol.challanNo}</b><br>
                <span style="color:var(--danger); font-size:10px; font-weight:bold;">
                    DUE: ${new Date(new Date(viol.time).getTime() + 7 * 24 * 60 * 60 * 1000).toLocaleDateString()}
                </span>
            </div>
        ` : ''}
    </div>
    
   ${isAlreadyFined ? 
    `<button class="action-btn" style="background:#ff9800; color:black;" onclick="markAsPaid('${key}')">
        COLLECT ₹${viol.fineAmount} & CLEAR
     </button>` : 
    `<button class="action-btn" onclick="judgeViolation('${key}')">
        ISSUE LEGAL NOTICE
     </button>`
}
    
    <button class="delete-btn" style="background:#21262d; color:#8b949e; margin-top:8px; border:1px solid var(--border);" 
            onclick="deleteRecord('${key}')">REMOVE LOG</button>
`;
            grid.prepend(card);
        }
    });
}
function deleteRecord(key) {
    // 1. Mandatory confirmation
    const confirmDelete = confirm("Are you sure? This incident data will be deleted permanently from the database.");

    if (confirmDelete) {
        // 2. Remove from LocalStorage
        localStorage.removeItem(key);

        // 3. Instant UI Update
        if (key.startsWith("VIOL-")) {
            renderChallans(); 
        } else if (key.startsWith("METRO-")) {
            renderUserList(); 
        }
        
        console.log("Record deleted: " + key);
    }
}
    // --- 3. MONITORING & MATH LOGIC (YOUR ORIGINAL LOGIC) ---
    function updateSliders() {
    if (isMonitoring) return;
    sliderContainer.innerHTML = '';
    linePoints = [];
    const count = parseInt(pointCountInput.value);
    
    for (let i = 0; i < count; i++) {
        // Initial point positions spread across the screen
        const x = Math.round((i / (count - 1)) * 100);
        const y = 80; 
        linePoints.push({ x, y });

        // Create a dedicated container for this specific point
        const div = document.createElement('div');
        div.className = 'control-group';
        div.style.marginBottom = "15px";
        div.style.borderLeft = "4px solid var(--accent)";
        
        div.innerHTML = `
            <label style="font-weight:bold; color:var(--accent);">YELLOW LINE POINT ${i+1}</label>
            
            <div style="margin: 10px 0;">
                <label>X-AXIS (HORIZONTAL)</label>
                <input type="range" data-idx="${i}" data-axis="x" min="0" max="100" value="${x}">
            </div>
            
            <div style="margin: 10px 0;">
                <label>Y-AXIS (VERTICAL)</label>
                <input type="range" data-idx="${i}" data-axis="y" min="0" max="100" value="${y}">
            </div>
        `;
        sliderContainer.appendChild(div);
    }
}

    sliderContainer.addEventListener('input', (e) => {
        const idx = e.target.dataset.idx;
        const axis = e.target.dataset.axis;
        linePoints[idx][axis] = parseFloat(e.target.value);
    });

    // Cross-product side detection
    function getSide(px, py, x1, y1, x2, y2) {
        return (px - x1) * (y2 - y1) - (py - y1) * (x2 - x1);
    }

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    pose.onResults((results) => {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;

        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Draw the Yellow Safety Line
        canvasCtx.beginPath();
        canvasCtx.strokeStyle = 'yellow';
        canvasCtx.lineWidth = 8;
        linePoints.forEach((p, i) => {
            const cx = (p.x / 100) * canvasElement.width;
            const cy = (p.y / 100) * canvasElement.height;
            if (i === 0) canvasCtx.moveTo(cx, cy);
            else canvasCtx.lineTo(cx, cy);
        });
        canvasCtx.stroke();

        if (results.poseLandmarks && isMonitoring) {
            const leftHip = results.poseLandmarks[23];
            const rightHip = results.poseLandmarks[24];
            const centerX = ((leftHip.x + rightHip.x) / 2) * 100;
            const centerY = ((leftHip.y + rightHip.y) / 2) * 100;

            // Detect active line segment based on person's X position
            let segmentIdx = 0;
            for(let i=0; i < linePoints.length - 1; i++) {
                if(centerX >= Math.min(linePoints[i].x, linePoints[i+1].x) && 
                   centerX <= Math.max(linePoints[i].x, linePoints[i+1].x)) {
                    segmentIdx = i;
                    break;
                }
            }

            const p1 = linePoints[segmentIdx];
            const p2 = linePoints[segmentIdx + 1] || p1;
            const side = getSide(centerX, centerY, p1.x, p1.y, p2.x, p2.y);
            const safeConfig = document.getElementById('safe-side').value;

            // Detect Breach based on Safe Side Orientation
            const isBreached = safeConfig === 'left' ? side > 0 : side < 0;

            if (isBreached) {
                if (!breachStartTime) breachStartTime = Date.now();
                const elapsed = Date.now() - breachStartTime;
                statusDisplay.innerText = `BREACH: ${(elapsed/1000).toFixed(1)}s`;
                statusDisplay.className = "status-card status-breach";
                if (elapsed > BREACH_THRESHOLD) {
                    captureViolation();
                    breachStartTime = Date.now() + 5000; // Cooldown
                }
            } else {
                breachStartTime = null;
                statusDisplay.innerText = "SAFE";
                statusDisplay.className = "status-card status-safe";
            }
        }
    });

    // --- 4. ENROLLMENT & DATABASE FUNCTIONS ---
    async function startSecureCapture() {
        if (isCapturing) return;
        capturedDescriptors = [];
        tempCapturedImages = [];
        captureStep = 0;
        isCapturing = true;
        document.querySelectorAll('.angle-box').forEach(b => b.className = 'angle-box');
        runCaptureSequence();
    }

    async function runCaptureSequence() {
    if (captureStep >= 4) {
        isCapturing = false;
        statusDisplay.innerText = "CAPTURES COMPLETE";
        statusDisplay.className = "status-card status-safe";
        return;
    }

    statusDisplay.innerText = commands[captureStep];
    await new Promise(r => setTimeout(r, 2000));

    const det = await faceapi.detectSingleFace(videoElement).withFaceLandmarks().withFaceDescriptor();

    if (det) {
        capturedDescriptors.push(Array.from(det.descriptor));
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = videoElement.videoWidth;
        tempCanvas.height = videoElement.videoHeight;
        tempCanvas.getContext('2d').drawImage(videoElement, 0, 0);
        tempCapturedImages.push(tempCanvas.toDataURL('image/jpeg'));

        // SAFETY CHECK: Prevents the "Cannot set properties of null" error
        const indicator = document.getElementById(`a${captureStep}`);
        if (indicator) {
            indicator.className = "angle-box done";
        }
        
        captureStep++;
        runCaptureSequence();
    } else {
        statusDisplay.innerText = "RETRYING SCAN...";
        setTimeout(runCaptureSequence, 1000);
    }
}

    // --- 5. VIOLATION LOGGING ---
  async function captureViolation() {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = videoElement.videoWidth;
    tempCanvas.height = videoElement.videoHeight;
    const ctx = tempCanvas.getContext('2d');
    
    // 1. Capture the Frame immediately
    ctx.translate(tempCanvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(videoElement, 0, 0);
    
    // 2. Draw the Yellow Safety Line on the Evidence
    ctx.setTransform(1, 0, 0, 1, 0, 0); 
    ctx.beginPath();
    ctx.strokeStyle = 'yellow';
    ctx.lineWidth = 10;
    linePoints.forEach((p, i) => {
        const cx = (p.x / 100) * tempCanvas.width;
        const cy = (p.y / 100) * tempCanvas.height;
        if (i === 0) ctx.moveTo(cx, cy);
        else ctx.lineTo(cx, cy);
    });
    ctx.stroke();

    const dataUrl = tempCanvas.toDataURL('image/jpeg');
    let detectedRfid = "UNKNOWN_ID";
    let matchScore = 0;

    // 3. MANDATORY IDENTIFICATION: We await the detection result
    try {
        const det = await faceapi.detectSingleFace(videoElement)
            .withFaceLandmarks()
            .withFaceDescriptor();

        if (det) {
            // Scan through all METRO- keys in storage
            Object.keys(localStorage).forEach(key => {
                if (key.startsWith("METRO-")) {
                    const user = JSON.parse(localStorage.getItem(key));
                    user.descriptors.forEach(desc => {
                        const dist = faceapi.euclideanDistance(det.descriptor, new Float32Array(desc));
                        const score = (1 - dist) * 100;
                        // Higher score threshold (45%) for reliability
                        if (score > 45 && score > matchScore) {
                            matchScore = score;
                            detectedRfid = user.rfid;
                        }
                    });
                }
            });
        }
    } catch (e) {
        console.error("ID Detection Error:", e);
    }

    // 4. Save to LocalStorage ONLY after ID check is done
    const storageKey = "VIOL-" + Date.now(); 
    const violationObject = {
        id: storageKey,
        img: dataUrl, 
        time: new Date().toLocaleString(),
        linkedRfid: detectedRfid, 
        status: "PENDING",
        confidence: matchScore.toFixed(1)
    };

    localStorage.setItem(storageKey, JSON.stringify(violationObject));
    
    // 5. Update UI
    renderChallans(); 
    console.log(`Violation Logged. RFID: ${detectedRfid} (${matchScore}%)`);
}

    pointCountInput.onchange = updateSliders;

        async function loadFaceModels() {

    const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
    
    try {
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        console.log("Face Models Loaded Successfully");
    } catch (e) {
        console.error("Model Loading Failed: ", e);
    }
}
