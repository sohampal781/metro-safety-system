<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroGuard Pro | Safety Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        :root {
            --accent: #00d2ff;
            --danger: #ff3333;
            --success: #00e676;
            --bg: #0a0b10;
            --panel: #161b22;
            --border: #30363d;
            --police-blue: #1a237e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #e6edf3;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 380px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            z-index: 100;
        }

        .tabs {
            display: flex;
            background: #0d1117;
            padding: 10px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }

        .content-area { padding: 20px; overflow-y: auto; flex-grow: 1; }

        /* --- UI COMPONENTS --- */
        .status-card {
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            text-transform: uppercase;
        }

        .status-safe { background: rgba(0, 230, 118, 0.1); color: var(--success); border-color: var(--success); }
        .status-breach { background: rgba(255, 51, 51, 0.1); color: var(--danger); border-color: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .control-group { 
            background: #0d1117; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border);
        }

        label { font-size: 11px; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 8px; }

        input, select, button {
            width: 100%; box-sizing: border-box; padding: 12px; background: #161b22; 
            border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 14px;
        }

        .action-btn {
            background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; margin-top: 10px;
        }

        .delete-btn {
            background: #ff4444; color: white; font-size: 10px; padding: 5px; margin-top: 5px; border: none; border-radius: 4px; cursor: pointer;
        }

        /* --- VIEWPORT --- */
        #viewport {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, canvas {
            position: absolute;
            width: 95%; height: 90%;
            object-fit: contain;
            border-radius: 12px;
            transform: scaleX(-1);
        }

        /* --- CHALLAN TAB OVERLAY --- */
        #challan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 500;
            display: none;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .challan-header {
            border-bottom: 2px solid var(--police-blue);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .challan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .challan-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            border-top: 5px solid var(--danger);
        }

        .challan-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }

        .angle-status {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;
        }
        .angle-box {
            padding: 8px; font-size: 10px; text-align: center; background: #21262d; border-radius: 4px;
        }
        .angle-box.done { background: var(--success); color: black; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="tabs">
            <button id="tab-mon" class="tab-btn active" onclick="switchUI('monitor')">MONITOR</button>
            <button id="tab-reg" class="tab-btn" onclick="switchUI('register')">REGISTER</button>
            <button id="tab-cha" class="tab-btn" onclick="switchUI('challan')">CHALLAN</button>
        </div>

        <div id="monitor-ui" class="content-area">
            <div id="status-display" class="status-card status-safe">SYSTEM READY</div>
            
            <div class="control-group">
                <label>Safety Line Precision</label>
                <input type="number" id="point-count" min="2" max="10" value="3">
            </div>

            <div class="control-group">
                <label>Platform Orientation</label>
                <select id="safe-side">
                    <option value="left">Safe on Left</option>
                    <option value="right">Safe on Right</option>
                </select>
            </div>

            <div id="slider-container"></div>
            <button id="start-btn" class="action-btn">ENGAGE MONITORING</button>
        </div>

        <div id="register-ui" class="content-area" style="display:none;">
            <h3>New Enrollment</h3>
            <div class="control-group">
                <input type="text" id="reg-name" placeholder="Full Name" style="margin-bottom: 10px;">
                <input type="text" id="reg-mobile" placeholder="Mobile Number">
            </div>

            <div class="control-group">
                <label>Auto-Face Capture Status</label>
                <div class="angle-status">
                    <div id="a0" class="angle-box">FRONT</div>
                    <div id="a1" class="angle-box">LEFT</div>
                    <div id="a2" class="angle-box">RIGHT</div>
                    <div id="a3" class="angle-box">UP/DOWN</div>
                </div>
            </div>

            <button id="save-reg-btn" class="action-btn" onclick="saveRegistration()">FINALIZE REGISTRATION</button>
            
            <div id="user-list" style="margin-top:20px; font-size:12px;">
                <h4>Registered Database</h4>
                <div id="db-items"></div>
            </div>
        </div>
    </div>

    <div id="viewport">
        <video id="input-video" autoplay muted playsinline></video>
        <canvas id="output-canvas"></canvas>

        <div id="challan-overlay">
            <div class="challan-header">
                <h1>METRO POLICE E-CHALLAN SYSTEM</h1>
                <button class="action-btn" style="width:100px; margin:0;" onclick="switchUI('monitor')">CLOSE</button>
            </div>
            <div id="challan-grid" class="challan-grid"></div>
        </div>
    </div>

    <div id="fine-tab" style="display:none;">
        <h4 style="margin-top:0; color: var(--accent);">VIOLATION FEED</h4>
        <div id="violation-list"></div>
    </div>

    <script>
        // --- CORE VARIABLES ---
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const sliderContainer = document.getElementById('slider-container');
        const pointCountInput = document.getElementById('point-count');
        const startBtn = document.getElementById('start-btn');
        const statusDisplay = document.getElementById('status-display');
        const violationList = document.getElementById('violation-list');
        const challanGrid = document.getElementById('challan-grid');

        let isMonitoring = false;
        let linePoints = [];
        let breachStartTime = null;
        let capturedDescriptors = [];
        const BREACH_THRESHOLD = 1500;

        // --- UI LOGIC ---
        function switchUI(mode) {
            document.getElementById('monitor-ui').style.display = mode === 'monitor' ? 'block' : 'none';
            document.getElementById('register-ui').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('challan-overlay').style.display = mode === 'challan' ? 'block' : 'none';
            
            document.getElementById('tab-mon').classList.toggle('active', mode === 'monitor');
            document.getElementById('tab-reg').classList.toggle('active', mode === 'register');
            document.getElementById('tab-cha').classList.toggle('active', mode === 'challan');
            
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if(mode === 'challan') renderChallans();
            if(mode === 'register') renderUserList();
        }

        function updateSliders() {
            if (isMonitoring) return;
            sliderContainer.innerHTML = '';
            linePoints = [];
            const count = parseInt(pointCountInput.value);
            for (let i = 0; i < count; i++) {
                const x = (i / (count - 1)) * 100;
                const y = 80;
                linePoints.push({ x, y });
                const div = document.createElement('div');
                div.className = 'control-group';
                div.innerHTML = `<label>Node ${i+1} Pos</label>
                    <input type="range" data-idx="${i}" data-axis="x" value="${x}">
                    <input type="range" data-idx="${i}" data-axis="y" value="${y}">`;
                sliderContainer.appendChild(div);
            }
        }
        pointCountInput.onchange = updateSliders;
        updateSliders();

        sliderContainer.oninput = (e) => {
            const idx = e.target.dataset.idx;
            const axis = e.target.dataset.axis;
            linePoints[idx][axis] = parseFloat(e.target.value);
        };

        // --- AI INITIALIZATION ---
        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

        async function loadModels() {
            const URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(URL);
        }
        loadModels();

        // --- MAIN PROCESSING LOOP ---
        pose.onResults((results) => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (document.getElementById('monitor-ui').style.display !== 'none') {
                drawSafetyLine();
                if (results.poseLandmarks && isMonitoring) {
                    checkSafetyBreach(results.poseLandmarks);
                }
            } 
            else if (document.getElementById('register-ui').style.display !== 'none') {
                autoCaptureLogic();
            }
        });

        function drawSafetyLine() {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = 'yellow';
            canvasCtx.lineWidth = 10;
            linePoints.forEach((p, i) => {
                const cx = (p.x / 100) * canvasElement.width;
                const cy = (p.y / 100) * canvasElement.height;
                if (i === 0) canvasCtx.moveTo(cx, cy); else canvasCtx.lineTo(cx, cy);
            });
            canvasCtx.stroke();
        }

        function checkSafetyBreach(landmarks) {
    const hip = landmarks[23]; 
    const px = hip.x * 100;
    const py = hip.y * 100;
    
    // Absolute position check relative to the defined nodes
    const x1 = linePoints[0].x;
    const y1 = linePoints[0].y;
    const x2 = linePoints[linePoints.length - 1].x;
    const y2 = linePoints[linePoints.length - 1].y;
    
    const val = (px - x1) * (y2 - y1) - (py - y1) * (x2 - x1);
    const safeConfig = document.getElementById('safe-side').value;
    
    // Detects based on location even if user is not moving
    const isBreached = safeConfig === 'left' ? val > 0 : val < 0;

    if (isBreached) {
        if (!breachStartTime) breachStartTime = Date.now();
        const elapsed = Date.now() - breachStartTime;
        statusDisplay.innerText = `STATIONARY BREACH: ${(elapsed/1000).toFixed(1)}s`;
        statusDisplay.className = "status-card status-breach";
        if (elapsed > BREACH_THRESHOLD) {
            triggerViolationCapture();
            breachStartTime = Date.now() + 5000; // Cooldown
        }
    } else {
        breachStartTime = null;
        statusDisplay.innerText = "PLATFORM SAFE";
        statusDisplay.className = "status-card status-safe";
    }
}
       // --- 1. SECURE CAPTURE LOGIC (STRICT DIVERSITY & ANTI-CHEAT) ---
let isCapturing = false;
let captureStep = 0;
let tempCapturedImages = []; 
const commands = ["LOOK STRAIGHT (FRONT)", "TURN HEAD LEFT", "TURN HEAD RIGHT", "LOOK UP / DOWN"];

async function startSecureCapture() {
    if (isCapturing) return;
    capturedDescriptors = [];
    tempCapturedImages = [];
    captureStep = 0;
    isCapturing = true;
    // Reset visual indicators
    document.querySelectorAll('.angle-box').forEach(b => b.className = 'angle-box');
    nextCaptureStep();
}

async function nextCaptureStep() {
    if (captureStep >= 4) {
        document.getElementById('command-text').innerText = "ENROLLMENT READY";
        document.getElementById('save-reg-btn').disabled = false;
        isCapturing = false;
        return;
    }

    const timerEl = document.getElementById('countdown-timer');
    const commandEl = document.getElementById('command-text');
    commandEl.innerText = commands[captureStep];

    // 3 Second Countdown to force position change
    for (let i = 3; i > 0; i--) {
        timerEl.innerText = i;
        await new Promise(r => setTimeout(r, 1000));
    }

    const det = await faceapi.detectSingleFace(videoElement).withFaceLandmarks().withFaceDescriptor();
    
    // ANTI-CHEAT: Reject if no face (e.g., feet) or same angle as capture 0
    if (!det) {
        commandEl.innerText = "ERROR: NO FACE DETECTED!";
        setTimeout(nextCaptureStep, 2000);
        return;
    }

    // Strict Angle Diversity Check (Euclidean Distance)
    let isDuplicate = false;
    for (let prev of capturedDescriptors) {
        if (faceapi.euclideanDistance(det.descriptor, prev) < 0.4) {
            isDuplicate = true;
            break;
        }
    }

    if (isDuplicate && captureStep > 0) {
        commandEl.innerText = "ERROR: SAME ANGLE! MOVE HEAD.";
        setTimeout(nextCaptureStep, 2000);
    } else {
        capturedDescriptors.push(det.descriptor);
        
        // Save actual image for the Verification Terminal
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = videoElement.videoWidth;
        tempCanvas.height = videoElement.videoHeight;
        tempCanvas.getContext('2d').drawImage(videoElement, 0, 0);
        tempCapturedImages.push(tempCanvas.toDataURL('image/jpeg'));

        document.getElementById(`a${captureStep}`).className = "angle-box done";
        captureStep++;
        nextCaptureStep();
    }
}
       function triggerViolationCapture() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = videoElement.videoWidth;
            tempCanvas.height = videoElement.videoHeight;
            tempCanvas.getContext('2d').drawImage(videoElement, 0, 0);
            const dataUrl = tempCanvas.toDataURL('image/jpeg');
            const id = "VIOL-" + Date.now();
            localStorage.setItem(id, JSON.stringify({id, img: dataUrl, time: new Date().toLocaleString()}));
        }

        function renderChallans() {
            challanGrid.innerHTML = "";
            Object.keys(localStorage).forEach(key => {
                if(key.startsWith("VIOL-")) {
                    const viol = JSON.parse(localStorage.getItem(key));
                    const card = document.createElement('div');
                    card.className = 'challan-card';
                    card.id = `card-${viol.id}`;
                    card.innerHTML = `
                        <img src="${viol.img}">
                        <div style="font-size:11px; margin-bottom:10px;">Breach: ${viol.time}</div>
                        <div id="match-info-${viol.id}"></div>
                        <button class="action-btn" onclick="judgeViolation('${viol.id}', '${viol.img}')">IDENTIFY & FINE</button>
                        <button class="delete-btn" onclick="deleteRecord('${viol.id}')">DELETE RECORD</button>
                    `;
                    challanGrid.prepend(card);
                }
            });
        }

        async function judgeViolation(id, imgUrl) {
            const img = await faceapi.fetchImage(imgUrl);
            const det = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
            if (!det) return alert("Face blurred in capture.");

            let bestMatch = { score: 0, rfid: null, data: null };

            Object.keys(localStorage).forEach(key => {
                if(key.startsWith("METRO-")) {
                    const user = JSON.parse(localStorage.getItem(key));
                    user.descriptors.forEach(desc => {
                        const dist = faceapi.euclideanDistance(det.descriptor, new Float32Array(desc));
                        const match = (1 - dist) * 100;
                        if (match > bestMatch.score) {
                            bestMatch = { score: match, rfid: key, data: user };
                        }
                    });
                }
            });

            const display = document.getElementById(`match-info-${id}`);
            if (bestMatch.score >= 85) {
                display.innerHTML = `<div style="color:var(--success); font-weight:bold; margin-bottom:5px;">
                    MATCH: ${bestMatch.score.toFixed(1)}% - ${bestMatch.data.name}</div>
                    <button class="action-btn" style="background:var(--success)" onclick="alert('Fine Charged!')">SEND CHALLAN</button>`;
            } else {
                display.innerHTML = `<div style="color:orange; font-size:11px; margin-bottom:5px;">
                    LOW MATCH: ${bestMatch.score.toFixed(1)}%. Check manually.</div>
                    <input type="text" id="manual-${id}" placeholder="Enter RFID Manually" style="font-size:10px; padding:5px; margin-bottom:5px;">
                    <button class="action-btn" onclick="manualFine('${id}', '${bestMatch.score.toFixed(1)}')">MANUAL VERIFY</button>`;
            }
        }

        function manualFine(id, score) {
            const rfid = document.getElementById(`manual-${id}`).value;
            const user = JSON.parse(localStorage.getItem(rfid));
            if(!user) return alert("RFID Not Found!");
            alert(`Fine generated for ${user.name}. (AI match was ${score}%)`);
        }

        function renderUserList() {
            const container = document.getElementById('db-items');
            container.innerHTML = "";
            Object.keys(localStorage).forEach(key => {
                if(key.startsWith("METRO-")) {
                    const u = JSON.parse(localStorage.getItem(key));
                    container.innerHTML += `<div style="padding:5px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
                        ${u.name} (${key}) <span style="color:red; cursor:pointer;" onclick="deleteRecord('${key}')">✖</span></div>`;
                }
            });
        }

        function deleteRecord(key) {
            if(confirm("Delete this record permanently?")) {
                localStorage.removeItem(key);
                if(key.startsWith("METRO-")) renderUserList();
                else renderChallans();
            }
        }

        startBtn.onclick = () => {
            isMonitoring = !isMonitoring;
            startBtn.innerText = isMonitoring ? "DISENGAGE SYSTEM" : "ENGAGE MONITORING";
            startBtn.style.background = isMonitoring ? "var(--danger)" : "var(--accent)";
        };

        async function init() {
            const camera = new Camera(videoElement, {
                onFrame: async () => { await pose.send({image: videoElement}); },
                width: 1280, height: 720
            });
            camera.start();
        }
        init();
        let currentActiveViolation = null;

// Replace your judgeViolation function with this
async function judgeViolation(id, imgUrl) {
    currentActiveViolation = JSON.parse(localStorage.getItem(id));
    
    // Open the Big Screen Terminal
    document.getElementById('judgement-modal').style.display = 'block';
    document.getElementById('modal-violation-img').src = imgUrl;
    document.getElementById('incident-time').innerText = `INCIDENT LOG: ${currentActiveViolation.time}`;
    
    // Calculate AI Prediction
    const img = await faceapi.fetchImage(imgUrl);
    const det = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
    
    const predictionEl = document.getElementById('ai-prediction');
    if (!det) {
        predictionEl.innerHTML = `<span style="color:var(--danger)">FACE NOT CLEAR (MATCH: 0%)</span>`;
    } else {
        let best = 0;
        // Scan DB to find best match probability
        Object.keys(localStorage).forEach(k => {
            if(k.startsWith("METRO-")) {
                const u = JSON.parse(localStorage.getItem(k));
                u.descriptors.forEach(d => {
                    const match = (1 - faceapi.euclideanDistance(det.descriptor, new Float32Array(d))) * 100;
                    if (match > best) best = match;
                });
            }
        });
        const color = best > 85 ? 'var(--success)' : 'orange';
        predictionEl.innerHTML = `AI CONFIDENCE: <span style="color:${color}">${best.toFixed(1)}%</span>`;
    }
}

function fetchRegistrationData() {
    const rfid = document.getElementById('manual-rfid-input').value;
    const user = JSON.parse(localStorage.getItem(rfid));
    
    if (!user) {
        alert("RFID NOT FOUND IN DATABASE");
        return;
    }

    const display = document.getElementById('registration-display');
    const photoGrid = document.getElementById('reg-photos-grid');
    const info = document.getElementById('reg-user-info');

    display.style.display = 'block';
    info.innerHTML = `
        <div style="background:var(--police-blue); padding:10px; border-radius:5px; margin-bottom:15px;">
            <div style="color:var(--accent)">OFFENDER NAME: ${user.name}</div>
            <div style="color:white">RFID: ${user.rfid} | MOBILE: ${user.mobile}</div>
        </div>
    `;
    
    // Render the 4 registration images saved during enrollment
    photoGrid.innerHTML = "";
    if(user.regImages) {
        user.regImages.forEach((imgSrc, i) => {
            photoGrid.innerHTML += `
                <div style="border:1px solid var(--border); padding:5px; background:#000;">
                    <img src="${imgSrc}" style="width:100%; height:auto; border-radius:4px;">
                    <div style="font-size:9px; color:var(--accent); margin-top:5px;">REGISTRATION ANGLE ${i+1}</div>
                </div>`;
        });
    } else {
        photoGrid.innerHTML = "<p style='color:red;'>No image data found for this RFID.</p>";
    }
}

function closeJudgement() {
    document.getElementById('judgement-modal').style.display = 'none';
    document.getElementById('registration-display').style.display = 'none';
    document.getElementById('manual-rfid-input').value = "";
}

function finalizeFine() {
    const rfid = document.getElementById('manual-rfid-input').value;
    alert(`E-CHALLAN GENERATED SUCCESSFULLY\nSent to: ${rfid}\nIncident ID: ${currentActiveViolation.id}`);
    closeJudgement();
}
    </script>
    <div id="judgement-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; padding:40px; box-sizing:border-box; overflow-y:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--accent); padding-bottom:10px;">
        <h2 style="color:var(--accent); margin:0;">INCIDENT VERIFICATION TERMINAL</h2>
        <button onclick="closeJudgement()" style="background:var(--danger); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">EXIT TERMINAL</button>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px; margin-top:20px;">
        <div class="control-group">
            <h3 style="color:var(--danger)">EVIDENCE FOOTAGE</h3>
            <img id="modal-violation-img" style="width:100%; border:2px solid var(--danger); border-radius:10px;">
            <div style="background:#000; padding:10px; margin-top:10px; border-radius:5px; text-align:center;">
                <p id="incident-time" style="font-family:monospace; color:#aaa;"></p>
                <div style="display:flex; justify-content:center; gap:10px;">
                    <button class="btn" style="width:auto; font-size:10px;">⏪ -10s FOOTAGE</button>
                    <button class="btn" style="width:auto; font-size:10px;">⏩ +10s FOOTAGE</button>
                </div>
            </div>
            <div id="ai-prediction" style="margin-top:20px; font-size:24px; text-align:center; font-weight:bold;"></div>
        </div>

        <div class="control-group">
            <h3 style="color:var(--accent)">REGISTRATION DATA MATCHING</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="manual-rfid-input" placeholder="ENTER DETECTED RFID NUMBER" style="flex:1;">
                <button class="btn-main" style="width:120px;" onclick="fetchRegistrationData()">VERIFY ID</button>
            </div>

            <div id="registration-display" style="display:none;">
                <p id="reg-user-info" style="font-weight:bold; color:var(--success);"></p>
                <div id="reg-photos-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    </div>
                <button class="btn-main" style="margin-top:20px; background:var(--success)" onclick="finalizeFine()">CONFIRM & GENERATE CHALLAN</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
