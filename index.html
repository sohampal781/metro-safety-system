<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroGuard | AI Platform Safety</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root {
            --accent: #ffcc00;
            --danger: #ff4444;
            --safe: #00c851;
            --bg: #121212;
            --panel: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 350px;
            background: var(--panel);
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .status-card {
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 2px solid #444;
        }

        .status-safe { background: rgba(0, 200, 81, 0.2); color: var(--safe); border-color: var(--safe); }
        .status-breach { background: rgba(255, 68, 68, 0.2); color: var(--danger); border-color: var(--danger); }

        .control-group { margin-bottom: 15px; background: #2a2a2a; padding: 10px; border-radius: 5px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        select, button {
            width: 100%; padding: 10px; background: #333; color: white; border: 1px solid #444; border-radius: 4px; cursor: pointer;
        }

        #start-btn { background: var(--accent); color: black; font-weight: bold; margin-top: 10px; }
        #start-btn.active { background: var(--danger); color: white; }

        #viewport {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* Essential for visibility */
        video { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transform: scaleX(-1); /* Mirror for natural feel */
        }
        canvas { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            z-index: 10;
            transform: scaleX(-1);
        }

        #fine-tab {
            width: 300px;
            background: var(--panel);
            border-left: 2px solid #333;
            padding: 15px;
            overflow-y: auto;
        }

        .fine-card {
            background: #2a2a2a;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
        }

        .fine-card img { width: 100%; border-radius: 3px; margin-bottom: 5px; }
        .fine-actions { display: flex; gap: 5px; margin-top: 5px; }
        .btn-small { padding: 5px; font-size: 10px; flex: 1; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>METRO GUARD AI</h2>
        <div id="status-display" class="status-card status-safe">SYSTEM READY</div>

        <div class="control-group">
            <label>Points on Yellow Line (2-10)</label>
            <input type="number" id="point-count" min="2" max="10" value="3">
        </div>

        <div class="control-group">
            <label>Safe Side Orientation</label>
            <select id="safe-side">
                <option value="left">Left of Line</option>
                <option value="right">Right of Line</option>
            </select>
        </div>

        <div id="slider-container"></div>

        <button id="start-btn">LOCK & START MONITORING</button>
    </div>

    <div id="viewport">
        <video id="input-video" autoplay muted playsinline></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <div id="fine-tab">
        <h3>Violation Logs</h3>
        <div id="violation-list"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const sliderContainer = document.getElementById('slider-container');
        const pointCountInput = document.getElementById('point-count');
        const startBtn = document.getElementById('start-btn');
        const statusDisplay = document.getElementById('status-display');
        const violationList = document.getElementById('violation-list');

        let isMonitoring = false;
        let linePoints = [];
        let breachStartTime = null;
        const BREACH_THRESHOLD = 1500; 
        // --- FACE API INITIALIZATION ---
async function loadFaceModels() {
    // Loads models for face detection and landmark comparison
    await faceapi.nets.ssdMobilenetv1.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
    await faceapi.nets.faceLandmark68Net.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
    await faceapi.nets.faceRecognitionNet.loadFromUri('https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights');
}
loadFaceModels();

// --- MULTI-ANGLE REGISTRATION LOGIC ---
let registeredFaceDescriptors = []; // Stores the 4 angles

async function captureAndValidateAngle(angleIndex) {
    const detections = await faceapi.detectSingleFace(videoElement).withFaceLandmarks().withFaceDescriptor();
    
    if (!detections) {
        alert("No face detected! Please adjust your position.");
        return;
    }

    // CHECK FOR DUPLICATE ANGLES (Angle Validation)
    if (registeredFaceDescriptors.length > 0) {
        for (let existing of registeredFaceDescriptors) {
            const distance = faceapi.euclideanDistance(detections.descriptor, existing);
            if (distance < 0.15) { // Threshold for "too similar"
                alert("Error: This angle is too similar to a previous one. Please turn your head.");
                return;
            }
        }
    }

    registeredFaceDescriptors[angleIndex] = detections.descriptor;
    alert(`Angle ${angleIndex + 1} captured successfully!`);
}

// --- THE JUDGEMENT / MATCHING LOGIC (85% Threshold) ---
async function verifyViolation(violationImageElement, inputRfid) {
    // 1. Get face from the violation snapshot
    const violationDetection = await faceapi.detectSingleFace(violationImageElement).withFaceLandmarks().withFaceDescriptor();
    
    // 2. Fetch User from your Database (Simplified logic here)
    const dbUser = await fetchUserData(inputRfid); 
    const savedDescriptor = new Float32Array(dbUser.faceDescriptor);

    // 3. Calculate Euclidean Distance
    const distance = faceapi.euclideanDistance(violationDetection.descriptor, savedDescriptor);
    
    // Convert distance to Confidence Score
    // Distance 0.6 is roughly 50% match, 0.4 is ~90%
    const confidence = Math.max(0, (1 - distance) * 100);

    if (confidence >= 85) {
        processFine(dbUser.mobile, confidence);
    } else {
        alert(`Match Failed: Only ${confidence.toFixed(1)}% match. No fine charged.`);
    }
}

// --- RFID SERIAL CONNECTION ---
async function connectRFID() {
    try {
        const port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });
        const reader = port.readable.getReader();
        
        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            const rfidTag = new TextDecoder().decode(value);
            document.getElementById('reg-rfid').value = rfidTag.trim();
        }
    } catch (err) {
        console.error("RFID Error:", err);
    }
}
        function updateSliders() {
            if (isMonitoring) return;
            sliderContainer.innerHTML = '';
            linePoints = [];
            const count = parseInt(pointCountInput.value);
            
            for (let i = 0; i < count; i++) {
                const x = (i / (count - 1)) * 100;
                const y = 80; // Default lower position for platform line
                linePoints.push({ x, y });

                const div = document.createElement('div');
                div.className = 'control-group';
                div.innerHTML = `
                    <label>Point ${i+1} (X: ${x}%, Y: ${y}%)</label>
                    <input type="range" data-idx="${i}" data-axis="x" value="${x}">
                    <input type="range" data-idx="${i}" data-axis="y" value="${y}">
                `;
                sliderContainer.appendChild(div);
            }
        }

        sliderContainer.addEventListener('input', (e) => {
            const idx = e.target.dataset.idx;
            const axis = e.target.dataset.axis;
            linePoints[idx][axis] = parseFloat(e.target.value);
            e.target.previousElementSibling.innerText = `Point ${parseInt(idx)+1} (${linePoints[idx].x}%, ${linePoints[idx].y}%)`;
        });

        pointCountInput.addEventListener('change', updateSliders);
        updateSliders();

        function getSide(px, py, x1, y1, x2, y2) {
            return (px - x1) * (y2 - y1) - (py - y1) * (x2 - x1);
        }

        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

        pose.onResults((results) => {
            // Resize canvas to match video stream
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Draw Virtual Line
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = 'yellow';
            canvasCtx.lineWidth = 8;
            canvasCtx.lineJoin = 'round';
            linePoints.forEach((p, i) => {
                const cx = (p.x / 100) * canvasElement.width;
                const cy = (p.y / 100) * canvasElement.height;
                if (i === 0) canvasCtx.moveTo(cx, cy);
                else canvasCtx.lineTo(cx, cy);
            });
            canvasCtx.stroke();

            if (results.poseLandmarks && isMonitoring) {
                const leftHip = results.poseLandmarks[23];
                const rightHip = results.poseLandmarks[24];
                const centerX = ((leftHip.x + rightHip.x) / 2) * 100;
                const centerY = ((leftHip.y + rightHip.y) / 2) * 100;

                let segmentIdx = 0;
                for(let i=0; i < linePoints.length - 1; i++) {
                    if(centerX >= Math.min(linePoints[i].x, linePoints[i+1].x) && 
                       centerX <= Math.max(linePoints[i].x, linePoints[i+1].x)) {
                        segmentIdx = i;
                        break;
                    }
                }

                const p1 = linePoints[segmentIdx];
                const p2 = linePoints[segmentIdx + 1] || p1;
                const side = getSide(centerX, centerY, p1.x, p1.y, p2.x, p2.y);
                const safeConfig = document.getElementById('safe-side').value;

                // Mathematical side detection (Corrected for mirrored view)
                const isBreached = safeConfig === 'left' ? side > 0 : side < 0;

                if (isBreached) {
                    if (!breachStartTime) breachStartTime = Date.now();
                    const elapsed = Date.now() - breachStartTime;
                    statusDisplay.innerText = `BREACH DETECTED (${(elapsed/1000).toFixed(1)}s)`;
                    statusDisplay.className = "status-card status-breach";
                    if (elapsed > BREACH_THRESHOLD) {
                        captureViolation();
                        breachStartTime = Date.now() + 5000; // Cooldown
                    }
                } else {
                    breachStartTime = null;
                    statusDisplay.innerText = "SAFE";
                    statusDisplay.className = "status-card status-safe";
                }

                canvasCtx.fillStyle = isBreached ? 'red' : 'lime';
                canvasCtx.beginPath();
                canvasCtx.arc((centerX/100)*canvasElement.width, (centerY/100)*canvasElement.height, 12, 0, 2*Math.PI);
                canvasCtx.fill();
            }
            canvasCtx.restore();
        });

        function captureViolation() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvasElement.width;
            tempCanvas.height = canvasElement.height;
            const ctx = tempCanvas.getContext('2d');
            
            // Mirror back for the capture
            ctx.translate(tempCanvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(videoElement, 0, 0);
            ctx.drawImage(canvasElement, 0, 0);

            const dataUrl = tempCanvas.toDataURL('image/jpeg');
            const card = document.createElement('div');
            card.className = 'fine-card';
            card.innerHTML = `
                <img src="${dataUrl}">
                <strong>Violation @ ${new Date().toLocaleTimeString()}</strong>
                <div class="fine-actions">
                    <button class="btn-small" onclick="this.parentElement.parentElement.remove()">Delete</button>
                    <a href="${dataUrl}" download="fine.jpg"><button class="btn-small">Download</button></a>
                </div>
            `;
            violationList.prepend(card);
        }

        startBtn.onclick = () => {
            isMonitoring = !isMonitoring;
            startBtn.innerText = isMonitoring ? "STOP MONITORING" : "LOCK & START MONITORING";
            startBtn.classList.toggle('active');
            pointCountInput.disabled = isMonitoring;
            sliderContainer.querySelectorAll('input').forEach(i => i.disabled = isMonitoring);
        };

        // --- NEW IMPROVED CAMERA START ---
        async function startCamera() {
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await pose.send({image: videoElement});
                },
                width: 1280,
                height: 720
            });
            camera.start();
        }

        startCamera();
    </script>
</body>
</html>
