<!DOCTYPE html>

    <style>
        :root {
            --accent: #00d2ff;
            --danger: #ff3333;
            --success: #00e676;
            --bg: #0a0b10;
            --panel: #161b22;
            --border: #30363d;
            --police-blue: #1a237e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #e6edf3;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 380px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            z-index: 100;
        }

        .tabs {
            display: flex;
            background: #0d1117;
            padding: 10px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }

        .content-area { padding: 20px; overflow-y: auto; flex-grow: 1; }

        /* --- UI COMPONENTS --- */
        .status-card {
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            text-transform: uppercase;
        }

        .status-safe { background: rgba(0, 230, 118, 0.1); color: var(--success); border-color: var(--success); }
        .status-breach { background: rgba(255, 51, 51, 0.1); color: var(--danger); border-color: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .control-group { 
            background: #0d1117; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border);
        }

        label { font-size: 11px; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 8px; }

        input, select, button {
            width: 100%; box-sizing: border-box; padding: 12px; background: #161b22; 
            border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 14px;
        }

        .action-btn {
            background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; margin-top: 10px;
        }

        .delete-btn {
            background: #ff4444; color: white; font-size: 10px; padding: 5px; margin-top: 5px; border: none; border-radius: 4px; cursor: pointer;
        }

        /* --- VIEWPORT --- */
        #viewport {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, canvas {
            position: absolute;
            width: 95%; height: 90%;
            object-fit: contain;
            border-radius: 12px;
            transform: scaleX(-1);
        }

        /* --- CHALLAN TAB OVERLAY --- */
        #challan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 500;
            display: none;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .challan-header {
            border-bottom: 2px solid var(--police-blue);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .challan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .challan-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            border-top: 5px solid var(--danger);
        }

        .challan-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }

        .angle-status {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;
        }
        .angle-box {
            padding: 8px; font-size: 10px; text-align: center; background: #21262d; border-radius: 4px;
        }
        .angle-box.done { background: var(--success); color: black; }
        /* Make the sidebar container flexible but restricted */

/* Create a scrollable wrapper for the sliders */

}

#challan-grid::-webkit-scrollbar-thumb, #db-items::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 10px;
}
    </style>
</head>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCPixQatVPa326_yGej41aD9p5Z5Fyt3Lg",
        authDomain: "kolkata-metro-fine.firebaseapp.com",
        databaseURL: "https://kolkata-metro-fine-default-rtdb.firebaseio.com",
        projectId: "kolkata-metro-fine",
        storageBucket: "kolkata-metro-fine.firebasestorage.app",
        messagingSenderId: "835007350697",
        appId: "1:835007350697:web:8f359ed3fd8c0805ea66b8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    // --- 1. CORE SYSTEM VARIABLES ---
  // --- 1. CORE SYSTEM VARIABLES ---
const videoElement = document.getElementById('input-video');
const canvasElement = document.getElementById('output-canvas');
const canvasCtx = canvasElement.getContext('2d');
const sliderContainer = document.getElementById('slider-container');
const pointCountInput = document.getElementById('point-count');
const startBtn = document.getElementById('start-btn');
const statusDisplay = document.getElementById('status-display');

// Global Monitoring State
window.isMonitoring = false;
window.linePoints = [];
window.breachStartTime = null;
const BREACH_THRESHOLD = 1500; 

// Global Enrollment & Capture State (Shared across functions)
window.isCapturing = false;
window.captureStep = 0;
window.capturedDescriptors = [];
window.tempCapturedImages = [];
window.commands = ["LOOK STRAIGHT (FRONT)", "TURN HEAD LEFT", "TURN HEAD RIGHT", "LOOK UP / DOWN"];
   window.switchUI = (mode) => {
    // 1. Hide/Show main layout containers
    document.getElementById('monitor-ui').style.display = mode === 'monitor' ? 'block' : 'none';
    document.getElementById('register-ui').style.display = mode === 'register' ? 'block' : 'none';
    document.getElementById('challan-overlay').style.display = mode === 'challan' ? 'block' : 'none';
    
    // 2. Full-Screen Innovation: Hide the background monitoring viewport during registration
    const viewport = document.getElementById('viewport');
    if (mode === 'register') {
        viewport.style.display = 'none';
        document.getElementById('sidebar').style.width = '100%'; // Expand sidebar to full screen
    } else {
        viewport.style.display = 'flex';
        document.getElementById('sidebar').style.width = '380px'; // Return to normal
    }

    // 3. Tab active states
    document.getElementById('tab-mon').classList.toggle('active', mode === 'monitor');
    document.getElementById('tab-reg').classList.toggle('active', mode === 'register');
    document.getElementById('tab-cha').classList.toggle('active', mode === 'challan');
    
    if(mode === 'register') window.renderUserList();
};
window.judgeViolation = async function(key) {
    window.currentActiveViolationKey = key; // Store for the finalizeFine step
    
    // Fetch violation data from Firebase
    onValue(ref(db, 'violations/' + key), (snapshot) => {
        const violData = snapshot.val();
        if(!violData) return;

        document.getElementById('judgement-modal').style.display = 'block';
        document.getElementById('modal-violation-img').src = violData.img;
        
        const rfidInput = document.getElementById('manual-rfid-input');
        const aiPred = document.getElementById('ai-prediction');

        // Auto-fill if the system identified them during the breach
        if (violData.linkedRfid && violData.linkedRfid !== "UNKNOWN_ID") {
            rfidInput.value = violData.linkedRfid;
            aiPred.innerHTML = `<span style="color:var(--success)">AI MATCH: ${violData.linkedRfid}</span>`;
            window.fetchRegistrationData(); // Auto-load their profile
        } else {
            rfidInput.value = "";
            aiPred.innerHTML = `<span style="color:var(--danger)">MANUAL ID REQUIRED</span>`;
        }
    }, { onlyOnce: true });
};

// Also ensure closeJudgement is accessible
window.closeJudgement = function() {
    document.getElementById('judgement-modal').style.display = 'none';
    document.getElementById('registration-display').style.display = 'none';
};
window.fetchRegistrationData = function() {
    const inputRfid = document.getElementById('manual-rfid-input').value.trim();
    const display = document.getElementById('registration-display');
    const infoDisplay = document.getElementById('reg-user-info');
    
    if (!inputRfid) return alert("ENTER RFID");

    onValue(ref(db, 'users/' + inputRfid), (snapshot) => {
        const user = snapshot.val();
        if (!user) {
            alert("RFID NOT FOUND");
            display.style.display = 'none';
            return;
        }

        display.style.display = 'block';
        
        // Retrieve the first registration angle from the cloud database
        const regPhotoHtml = user.tempImages ? 
            `<img src="${user.tempImages[0]}" style="width:100%; border-radius:10px; border:2px solid var(--accent); margin-bottom:10px;">` : 
            `<div style="padding:20px; background:#111; color:#555; text-align:center;">PHOTO DATA NOT FOUND</div>`;

        infoDisplay.innerHTML = `
            <label style="color:var(--accent); font-size:11px; display:block; margin-bottom:5px;">ENROLLMENT RECORD PHOTO</label>
            ${regPhotoHtml}
            <div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:8px;">
                <h3 style="color:white; margin:0; letter-spacing:1px;">${user.name.toUpperCase()}</h3>
                <p style="color:var(--accent); margin:5px 0; font-family:monospace;">RFID: ${user.rfid}</p>
                <p style="color:var(--success); margin:0;">MOBILE: ${user.mobile}</p>
            </div>
        `;
    }, { onlyOnce: true });
};
        function loadDashboardData() {
    // This ensures that even after a refresh, the UI is populated
    renderChallans();   // Refresh the Violation Portal
    renderUserList();   // Refresh the Registered User List
    console.log("System Data Restored from LocalStorage");
}
window.finalizeFine = async function() {
    const rfid = document.getElementById('manual-rfid-input').value.trim();
    const amount = prompt("ENTER FINE AMOUNT (₹):", "500");
    
    if (!amount || isNaN(amount)) return;

    onValue(ref(db, 'users/' + rfid), async (snapshot) => {
        const user = snapshot.val();
        if (!user) return alert("Verify user first!");

        const challanNo = "KLK" + Date.now().toString().slice(-6);

        // CLEAN SINGLE LINE FORMAT: Guarantees delivery and single unit charge (₹5)
        const singleLineMsg = `KOLKATA METRO RAILWAY: CHALLAN NO ${challanNo}. FINE RS ${amount}. ACTION: PAY AT STATION MASTER DESK IMMEDIATELY.`;

        try {
            // Update violation status in Firebase
            await update(ref(db, 'violations/' + window.currentActiveViolationKey), {
                status: "FINED",
                fineAmount: amount,
                challanNo: challanNo
            });
            
            // Send to gateway
            console.log("Sending clean message (Chars: " + singleLineMsg.length + ")");
            const success = await window.sendKolkataSMS(user.mobile, singleLineMsg);
            
            if(success) {
                alert("MESSAGE SENT SUCCESSFULLY");
            } else {
                alert("GATEWAY ACCEPTED BUT DELIVERY FAILED");
            }
            
            window.closeJudgement();
        } catch (err) {
            alert("Error: " + err.message);
        }
    }, { onlyOnce: true });
};
       window.markAsPaid = async function(violationKey) {
        if(confirm("Confirm Payment? This record will be deleted from the server.")) {
            await remove(ref(db, 'violations/' + violationKey));
            alert("PAYMENT RECEIVED. RECORD DELETED.");
        }
    }
       onValue(ref(db, 'violations'), (snapshot) => {
        const data = snapshot.val();
        renderChallans(data);
    });

// Optimized Gateway Function
window.sendKolkataSMS = async function(number, message) {
        const apiKey = "HzZRzYz09iEIB7Glr3OmdOgt3PMocm66xPHcXWoaUvMaN9UKvlinysQDafuD";
        const cleanMsg = message.replace(/(\r\n|\n|\r)/gm, " ").trim();
        const url = `https://www.fast2sms.com/dev/bulkV2?authorization=${apiKey}&route=q&message=${encodeURIComponent(cleanMsg)}&numbers=${number}`;
        
        try {
            const response = await fetch(url);
            const result = await response.json();
            return result.return === true;
        } catch (error) {
            console.error("SMS Error:", error);
            return false;
        }
    };  

        window.deleteRecord = async function(key) {
    if (confirm("Permanently delete this violation log?")) {
        try {
            // Directly target the Firebase path
            const recordRef = ref(db, 'violations/' + key);
            await remove(recordRef);
            alert("Record Deleted.");
            // No need to call renderChallans() manually, 
            // the onValue listener handles it automatically.
        } catch (e) {
            alert("Delete failed: " + e.message);
        }
    }
};
       // --- SEARCH AND LOAD USER FOR UPDATE ---
window.lookupUser = function() {
    const searchName = document.getElementById('reg-name').value.trim().toLowerCase();
    if (!searchName) return alert("Enter a name to search.");

    onValue(ref(db, 'users'), (snapshot) => {
        const users = snapshot.val();
        let found = false;
        if (users) {
            Object.keys(users).forEach(rfid => {
                if (users[rfid].name.toLowerCase() === searchName) {
                    document.getElementById('reg-mobile').value = users[rfid].mobile;
                    document.getElementById('reg-name').dataset.activeRfid = rfid; // Store the ID for update
                    alert(`USER FOUND: ${users[rfid].name}\nRFID: ${rfid}`);
                    found = true;
                }
            });
        }
        if (!found) alert("No matching records in Kolkata Metro database.");
    }, { onlyOnce: true });
};
  window.renderChallans = function() {
    const grid = document.getElementById('challan-grid');
    if (!grid) return;
    
    // 1. Listen for real-time changes on the Firebase Server
    onValue(ref(db, 'violations'), (snapshot) => {
        grid.innerHTML = "";
        const data = snapshot.val();
        
        if (!data) {
            grid.innerHTML = "<h3 style='color:#8b949e; text-align:center; width:100%;'>NO PENDING VIOLATIONS</h3>";
            return;
        }

        // 2. Loop through Cloud Data (Reversed for latest first)
        Object.keys(data).reverse().forEach(key => {
            const viol = data[key];
            const isAlreadyFined = (viol.status === "FINED");
            const card = document.createElement('div');
            card.className = 'challan-card';
            card.style.borderTopColor = isAlreadyFined ? 'var(--success)' : 'var(--danger)';

            card.innerHTML = `
                <img src="${viol.img}" style="width:100%; border-radius:8px;">
                <div style="font-size:12px; margin: 10px 0; color: #e6edf3;">
                    <b style="color:var(--accent)">RFID: ${viol.linkedRfid}</b><br>
                    <span>Time: ${viol.time}</span>
                    ${isAlreadyFined ? `
                        <div style="margin-top:8px; padding:8px; background:rgba(0,210,255,0.1); border:1px solid var(--accent); border-radius:4px;">
                            <b style="color:var(--accent); font-size:10px;">CHALLAN: ${viol.challanNo}</b>
                        </div>
                    ` : ''}
                </div>
                ${isAlreadyFined ? 
                    `<button class="action-btn" style="background:#ff9800; color:black;" onclick="window.markAsPaid('${key}')">
                        COLLECT ₹${viol.fineAmount} & CLEAR
                     </button>` : 
                    `<button class="action-btn" onclick="window.judgeViolation('${key}')">
                        ISSUE LEGAL NOTICE
                     </button>`
                }
                <button class="delete-btn" style="background:#21262d; color:#8b949e; margin-top:8px;" 
                        onclick="window.deleteRecord('${key}')">REMOVE LOG</button>
            `;
            grid.appendChild(card);
        });
    });
};

    // --- 3. MONITORING & MATH LOGIC (YOUR ORIGINAL LOGIC) ---
    function updateSliders() {
    if (isMonitoring) return;
    sliderContainer.innerHTML = '';
    linePoints = [];
    const count = parseInt(pointCountInput.value);
    
    for (let i = 0; i < count; i++) {
        // Initial point positions spread across the screen
        const x = Math.round((i / (count - 1)) * 100);
        const y = 80; 
        linePoints.push({ x, y });

        // Create a dedicated container for this specific point
        const div = document.createElement('div');
        div.className = 'control-group';
        div.style.marginBottom = "15px";
        div.style.borderLeft = "4px solid var(--accent)";
        
        div.innerHTML = `
            <label style="font-weight:bold; color:var(--accent);">YELLOW LINE POINT ${i+1}</label>
            
            <div style="margin: 10px 0;">
                <label>X-AXIS (HORIZONTAL)</label>
                <input type="range" data-idx="${i}" data-axis="x" min="0" max="100" value="${x}">
            </div>
            
            <div style="margin: 10px 0;">
                <label>Y-AXIS (VERTICAL)</label>
                <input type="range" data-idx="${i}" data-axis="y" min="0" max="100" value="${y}">
            </div>
        `;
        sliderContainer.appendChild(div);
    }
}

    sliderContainer.addEventListener('input', (e) => {
        const idx = e.target.dataset.idx;
        const axis = e.target.dataset.axis;
        linePoints[idx][axis] = parseFloat(e.target.value);
    });

    // Cross-product side detection
    function getSide(px, py, x1, y1, x2, y2) {
        return (px - x1) * (y2 - y1) - (py - y1) * (x2 - x1);
    }

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    pose.onResults((results) => {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;

        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Draw the Yellow Safety Line
        canvasCtx.beginPath();
        canvasCtx.strokeStyle = 'yellow';
        canvasCtx.lineWidth = 8;
        linePoints.forEach((p, i) => {
            const cx = (p.x / 100) * canvasElement.width;
            const cy = (p.y / 100) * canvasElement.height;
            if (i === 0) canvasCtx.moveTo(cx, cy);
            else canvasCtx.lineTo(cx, cy);
        });
        canvasCtx.stroke();

        if (results.poseLandmarks && isMonitoring) {
            const leftHip = results.poseLandmarks[23];
            const rightHip = results.poseLandmarks[24];
            const centerX = ((leftHip.x + rightHip.x) / 2) * 100;
            const centerY = ((leftHip.y + rightHip.y) / 2) * 100;

            // Detect active line segment based on person's X position
            let segmentIdx = 0;
            for(let i=0; i < linePoints.length - 1; i++) {
                if(centerX >= Math.min(linePoints[i].x, linePoints[i+1].x) && 
                   centerX <= Math.max(linePoints[i].x, linePoints[i+1].x)) {
                    segmentIdx = i;
                    break;
                }
            }

            const p1 = linePoints[segmentIdx];
            const p2 = linePoints[segmentIdx + 1] || p1;
            const side = getSide(centerX, centerY, p1.x, p1.y, p2.x, p2.y);
            const safeConfig = document.getElementById('safe-side').value;

            // Detect Breach based on Safe Side Orientation
            const isBreached = safeConfig === 'left' ? side > 0 : side < 0;

            if (isBreached) {
                if (!breachStartTime) breachStartTime = Date.now();
                const elapsed = Date.now() - breachStartTime;
                statusDisplay.innerText = `BREACH: ${(elapsed/1000).toFixed(1)}s`;
                statusDisplay.className = "status-card status-breach";
                if (elapsed > BREACH_THRESHOLD) {
                    captureViolation();
                    breachStartTime = Date.now() + 5000; // Cooldown
                }
            } else {
                breachStartTime = null;
                statusDisplay.innerText = "SAFE";
                statusDisplay.className = "status-card status-safe";
            }
        }
    });

   window.startSecureCapture = async function() {
    // Reset enrollment data
    window.capturedDescriptors = [];
    window.tempCapturedImages = [];
    window.captureStep = 0;
    
    const regVideo = document.getElementById('reg-video');
    const statusDisplay = document.getElementById('status-display');
    
    try {
        // Request camera specifically for the small registration window
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        regVideo.srcObject = stream;
        window.isCapturing = true;
        
        // Reset the visual indicators
        document.querySelectorAll('.angle-box').forEach(b => b.className = 'angle-box');
        
        // Start the automated sequence
        window.runCaptureSequence(); 
    } catch (err) {
        alert("Camera Error: Ensure Monitoring is STOPPED first. " + err.message);
    }
};

window.runCaptureSequence = async function() {
    const regVideo = document.getElementById('reg-video');
    const statusDisplay = document.getElementById('status-display');
    const commands = ["LOOK STRAIGHT (FRONT)", "TURN HEAD LEFT", "TURN HEAD RIGHT", "LOOK UP / DOWN"];

    if (window.captureStep >= 4) {
        window.isCapturing = false;
        statusDisplay.innerText = "SCANS COMPLETE - READY TO SAVE";
        document.getElementById('save-reg-btn').style.display = 'block';
        return;
    }

    statusDisplay.innerText = commands[window.captureStep];
    await new Promise(r => setTimeout(r, 2000));

    // Detect face from the registration video element
    const det = await faceapi.detectSingleFace(regVideo).withFaceLandmarks().withFaceDescriptor();

    if (det) {
        // FIX: Use window. prefix to avoid the 'undefined' error
        window.capturedDescriptors.push(Array.from(det.descriptor));
        
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 400;
        tempCanvas.height = 300;
        tempCanvas.getContext('2d').drawImage(regVideo, 0, 0, 400, 300);
        window.tempCapturedImages.push(tempCanvas.toDataURL('image/jpeg', 0.6));

        const indicator = document.getElementById(`a${window.captureStep}`);
        if (indicator) indicator.className = "angle-box done";
        
        window.captureStep++;
        window.runCaptureSequence(); // Call itself for the next angle
    } else {
        statusDisplay.innerText = "RETRYING SCAN...";
        setTimeout(window.runCaptureSequence, 1000);
    }
};

}

    // --- 5. VIOLATION LOGGING ---
 window.captureViolation = async function() {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = videoElement.videoWidth;
    tempCanvas.height = videoElement.videoHeight;
    const ctx = tempCanvas.getContext('2d');
    
    // 1. Snapshot with Line Overlay
    ctx.save();
    ctx.translate(tempCanvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(videoElement, 0, 0);
    ctx.restore();

    ctx.beginPath();
    ctx.strokeStyle = 'yellow';
    ctx.lineWidth = 10;
    window.linePoints.forEach((p, i) => {
        const lx = (p.x / 100) * tempCanvas.width;
        const ly = (p.y / 100) * tempCanvas.height;
        if (i === 0) ctx.moveTo(lx, ly);
        else ctx.lineTo(lx, ly);
    });
    ctx.stroke();

    const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.6);

    // 2. Robust Biometric Logic
    let detectedRfid = "UNKNOWN_ID";
    let highestScore = 0;

    try {
        const det = await faceapi.detectSingleFace(videoElement).withFaceLandmarks().withFaceDescriptor();

        if (det) {
            const { get, ref: dbRef } = await import("https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js");
            const snapshot = await get(dbRef(db, 'users'));
            
            if (snapshot.exists()) {
                const cloudUsers = snapshot.val();

                for (let rfid in cloudUsers) {
                    const user = cloudUsers[rfid];
                    if (!user.descriptors) continue;

                    const savedDescriptors = Object.values(user.descriptors);
                    
                    for (const rawDesc of savedDescriptors) {
                        // Reconstruct Float32Array to fix comparison math
                        const serverDescriptor = new Float32Array(Object.values(rawDesc));
                        const distance = faceapi.euclideanDistance(det.descriptor, serverDescriptor);
                        const score = (1 - distance) * 100;

                        if (score > highestScore) {
                            highestScore = score;
                            if (highestScore > 40) { 
                                detectedRfid = rfid;
                            }
                        }
                    }
                }
            }
        }
    } catch (e) { console.error("Biometric Error:", e); }

    // 3. Save Log
    const violID = "VIOL-" + Date.now();
    const { set, ref: saveRef } = await import("https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js");
    
    await set(saveRef(db, 'violations/' + violID), {
        id: violID,
        img: dataUrl,
        time: new Date().toLocaleString(),
        linkedRfid: detectedRfid,
        status: "PENDING",
        confidence: highestScore.toFixed(1)
    });
};

}
