    <style>
        :root {
            --accent: #00d2ff;
            --danger: #ff3333;
            --success: #00e676;
            --bg: #0a0b10;
            --panel: #161b22;
            --border: #30363d;
            --police-blue: #1a237e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #e6edf3;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 380px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            z-index: 100;
        }

        .tabs {
            display: flex;
            background: #0d1117;
            padding: 10px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }

        .content-area { padding: 20px; overflow-y: auto; flex-grow: 1; }

        /* --- UI COMPONENTS --- */
        .status-card {
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            text-transform: uppercase;
        }

        .status-safe { background: rgba(0, 230, 118, 0.1); color: var(--success); border-color: var(--success); }
        .status-breach { background: rgba(255, 51, 51, 0.1); color: var(--danger); border-color: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .control-group { 
            background: #0d1117; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border);
        }

        label { font-size: 11px; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 8px; }

        input, select, button {
            width: 100%; box-sizing: border-box; padding: 12px; background: #161b22; 
            border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 14px;
        }

        .action-btn {
            background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; margin-top: 10px;
        }

        .delete-btn {
            background: #ff4444; color: white; font-size: 10px; padding: 5px; margin-top: 5px; border: none; border-radius: 4px; cursor: pointer;
        }

        /* --- VIEWPORT --- */
        #viewport {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, canvas {
            position: absolute;
            width: 95%; height: 90%;
            object-fit: contain;
            border-radius: 12px;
            transform: scaleX(-1);
        }

        /* --- CHALLAN TAB OVERLAY --- */
        #challan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 500;
            display: none;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .challan-header {
            border-bottom: 2px solid var(--police-blue);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .challan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .challan-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            border-top: 5px solid var(--danger);
        }

        .challan-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }

        .angle-status {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;
        }
        .angle-box {
            padding: 8px; font-size: 10px; text-align: center; background: #21262d; border-radius: 4px;
        }
        .angle-box.done { background: var(--success); color: black; }
        /* Make the sidebar container flexible but restricted */
#sidebar {

/* Create a scrollable wrapper for the sliders */

    border-radius: 10px;
}

   window.switchUI = (mode) => {
    // 1. Core Visibility: Hide/Show main layout containers
    document.getElementById('monitor-ui').style.display = mode === 'monitor' ? 'block' : 'none';
    document.getElementById('register-ui').style.display = mode === 'register' ? 'block' : 'none';

window.judgeViolation = async function(key) {
    window.currentActiveViolationKey = key;
    
    onValue(ref(db, 'violations/' + key), (snapshot) => {
        const violData = snapshot.val();
        if(!violData) return;

        const modal = document.getElementById('judgement-modal');
        const rfidInput = document.getElementById('manual-rfid-input');
        const modalImg = document.getElementById('modal-violation-img');

        // Show Modal
        modal.style.display = 'block';
        modalImg.src = violData.img;
        
        // AUTO-LOAD AI DETECTION
        if (violData.linkedRfid && violData.linkedRfid !== "UNKNOWN_ID") {
            rfidInput.value = violData.linkedRfid;
            // IMMEDIATELY fetch the name and phone number
            window.fetchDetailedProsecutionData(); 
        } else {
            rfidInput.value = "";
            rfidInput.placeholder = "MANUAL RFID REQUIRED";
            // Hide previous data if any
            document.getElementById('passenger-info-display').style.display = 'none';
            document.getElementById('prosecution-controls').style.display = 'none';
        }
    }, { onlyOnce: true });
};

window.closeJudgement = function() {
    const modal = document.getElementById('judgement-modal');
    // Hide Modal
    modal.style.display = 'none';
    
    // RESET UI for next time
    document.getElementById('manual-rfid-input').value = "";
    document.getElementById('passenger-info-display').style.display = 'none';
    document.getElementById('prosecution-controls').style.display = 'none';
    document.getElementById('biometric-gallery').innerHTML = "";
    document.getElementById('offence-history').innerHTML = "";
};
window.fetchRegistrationData = function() {
    const inputRfid = document.getElementById('manual-rfid-input').value.trim();
    const display = document.getElementById('registration-display');
    const infoDisplay = document.getElementById('reg-user-info');
    
    if (!inputRfid) return alert("ENTER RFID");

    onValue(ref(db, 'users/' + inputRfid), (snapshot) => {
        const user = snapshot.val();
        if (!user) {
            alert("RFID NOT FOUND IN DATABASE");
            if (display) display.style.display = 'none';
            return;
        }

        if (display) {
            display.style.display = 'block';
            // CRITICAL: This is what the SMS function looks for
            display.dataset.latestMobile = user.mobile; 
            display.dataset.passengerName = user.name;
        }

        const regPhotoHtml = user.tempImages ? 
            `<img src="${user.tempImages[0]}" style="width:100%; border-radius:10px; border:2px solid var(--accent); margin-bottom:10px;">` : 
            `<div style="padding:20px; background:#111; color:#555; text-align:center;">NO PHOTO</div>`;

        if (infoDisplay) {
            infoDisplay.innerHTML = `
                <label style="color:var(--accent); font-size:11px; display:block; margin-bottom:5px;">LATEST ENROLLMENT DATA</label>
                ${regPhotoHtml}
                <div style="background:rgba(255,255,255,0.05); padding:12px; border-radius:8px;">
                    <h3 style="color:white; margin:0;">${user.name.toUpperCase()}</h3>
                    <p style="color:var(--accent); margin:5px 0; font-family:monospace;">RFID: ${user.rfid}</p>
                    <p style="color:var(--success); margin:0; font-weight:bold;">CURRENT MOBILE: ${user.mobile}</p>
                </div>
            `;
        }
    }, { onlyOnce: true });
};

// CONTROL F: FINALIZE FINE (STRICT 160 CHAR LIMIT / SINGLE LINE)
window.finalizeFine = async function() {
    const display = document.getElementById('registration-display');
    const latestMobile = display.dataset.latestMobile;
    const currentStatus = document.getElementById('status-display');
    
    // 1. Get Inputs
    const amount = prompt("ENTER FINE AMOUNT:", "1000");
    if (!amount) return; // Stop if cancelled

    const offence = "YELLOW LINE BREACH"; 
    const station = "DUMDUM";             
    const challanNo = Math.floor(100000 + Math.random() * 900000); 

    // 2. Build Message (158 Chars)
    let msg = `KOLKATA METRO: CHN ${challanNo}. STN: ${station}. OFFENCE: ${offence}. FINE: RS ${amount}. PAY STATION MASTER WITHIN 7 DAYS. THIS IS TESTING MESSAGE NO NEED TO PANIC`;

    try {
        const { update, ref: dbRef } = await import("https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js");
        
        // 3. Update Firebase
        await update(dbRef(db, 'violations/' + window.currentActiveViolationKey), {
            status: "FINED",
            fineAmount: amount,
            offence: offence,
            challanNo: challanNo,
            station: station,
            linkedMobile: latestMobile
        });
        
        // 4. Send SMS & Log to Console
        window.sendKolkataSMS(latestMobile, msg);
        console.log(`%c[DATABASE UPDATED]`, "color: #00e676", `Challan ${challanNo} for ${latestMobile}`);

        // 5. 15-SECOND UI COUNTDOWN
        let timeLeft = 15;
        currentStatus.className = "status-card status-safe";
        
        const resetTimer = setInterval(() => {
            timeLeft--;
            currentStatus.innerHTML = `
                <div style="color:var(--success)">PROSECUTION COMPLETE</div>
                <div style="font-size:14px">SYSTEM RESET IN ${timeLeft}s</div>
            `;
            
            if (timeLeft <= 0) {
                clearInterval(resetTimer);
                window.closeJudgement(); 
                currentStatus.innerText = "SYSTEM READY";
                window.renderChallans(); // Update the Portal Sections
            }
        }, 1000);

    } catch (err) {
        console.error("Firebase Error:", err);
        alert("Failed to save to Cloud.");
    }
};

        // Create the Settlement UI Overlay

        linePoints[idx][axis] = parseFloat(e.target.value);
    });

    // Cross-product side detection
    function getSide(px, py, x1, y1, x2, y2) {
        return (px - x1) * (y2 - y1) - (py - y1) * (x2 - x1);
    }

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    pose.onResults((results) => {
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

    // 1. DRAW MIRRORED VIDEO VIEW (Optional: usually handled by CSS transform)
    // If your <canvas> has CSS 'transform: scaleX(-1)', we draw normally in JS.
    
    // 2. DRAW THE YELLOW SAFETY LINE
    canvasCtx.beginPath();
    canvasCtx.strokeStyle = 'yellow';
    canvasCtx.lineWidth = 8;
    window.linePoints.forEach((p, i) => {
        const cx = (p.x / 100) * canvasElement.width;
        const cy = (p.y / 100) * canvasElement.height;
        if (i === 0) canvasCtx.moveTo(cx, cy);
        else canvasCtx.lineTo(cx, cy);
    });
    canvasCtx.stroke();

    if (results.poseLandmarks && isMonitoring) {
        let minX = canvasElement.width, maxX = 0, minY = canvasElement.height, maxY = 0;
        const leftHip = results.poseLandmarks[23];
        const rightHip = results.poseLandmarks[24];
        
        // Use normalized person center
        const personX = ((leftHip.x + rightHip.x) / 2) * 100;
        const personY = ((leftHip.y + rightHip.y) / 2) * 100;

        results.poseLandmarks.forEach(lm => {
            const px = lm.x * canvasElement.width;
            const py = lm.y * canvasElement.height;
            if (px < minX) minX = px; if (px > maxX) maxX = px;
            if (py < minY) minY = py; if (py > maxY) maxY = py;
        });

        // Calculate Distance (Math logic)
        let minDistancePx = Infinity;
        for (let i = 0; i < window.linePoints.length - 1; i++) {
            const p1 = window.linePoints[i]; const p2 = window.linePoints[i+1];
            const x1 = (p1.x/100) * canvasElement.width; const y1 = (p1.y/100) * canvasElement.height;
            const x2 = (p2.x/100) * canvasElement.width; const y2 = (p2.y/100) * canvasElement.height;
            const px = (personX/100) * canvasElement.width; const py = (personY/100) * canvasElement.height;
            const A = px - x1; const B = py - y1; const C = x2 - x1; const D = y2 - y1;
            const dot = A * C + B * D; const len_sq = C * C + D * D;
            let param = (len_sq != 0) ? dot / len_sq : -1;
            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; } else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }
            const dist = Math.sqrt((px - xx)**2 + (py - yy)**2);
            if (dist < minDistancePx) minDistancePx = dist;
        }

        const distanceCM = Math.round(minDistancePx * 0.3);
        const side = getSide(personX, personY, window.linePoints[0].x, window.linePoints[0].y, window.linePoints[1].x, window.linePoints[1].y);
        const safeConfig = document.getElementById('safe-side').value;
        const isBreached = safeConfig === 'left' ? side > 0 : side < 0;

        // --- THE FIX FOR MIRRORED TEXT ---
        // Save state, then reset transform specifically for the text box
        canvasCtx.save();
        
        // 3. DRAW BOX (Normally)
        canvasCtx.lineWidth = 5;
        canvasCtx.strokeStyle = isBreached ? '#ff0000' : '#00ff00';
        canvasCtx.strokeRect(minX, minY, maxX - minX, maxY - minY);

        // 4. DRAW TEXT BOX (Flip text context back to normal)
        // If the canvas is mirrored via CSS scaleX(-1), 
        // we need to flip the text horizontally so it looks normal to the viewer.
        canvasCtx.translate(minX, minY - 35); 
        canvasCtx.scale(-1, 1); // FLIP TEXT BACK
        canvasCtx.translate(-220, 0); // Offset for the label width

        canvasCtx.fillStyle = isBreached ? '#ff0000' : '#00ff00';
        canvasCtx.fillRect(0, 0, 220, 35);

        canvasCtx.fillStyle = 'white';
        canvasCtx.font = 'bold 18px Inter, sans-serif';
        const statusText = isBreached ? `LANE VIOLATION | ${distanceCM}cm` : `SAFE | ${distanceCM}cm`;
        canvasCtx.fillText(statusText, 10, 25);
        
        canvasCtx.restore(); // Restore original mirroring for next frame

        // Breach Logic
        if (isBreached) {
            if (!breachStartTime) breachStartTime = Date.now();
            const elapsed = Date.now() - breachStartTime;
            statusDisplay.innerText = `BREACH: ${(elapsed/1000).toFixed(1)}s`;

}

        }
    }

window.captureViolation = async function(minX, maxX, minY, maxY, distance, results) {
    // --- STEP 1: VERIFY HUMAN FACE PRESENCE ---
    // We check for a face BEFORE doing anything else to stop curtain triggers
    let faceDetection = null;
    try {
        faceDetection = await faceapi.detectSingleFace(videoElement).withFaceLandmarks().withFaceDescriptor();
    } catch (e) { console.log("Face API Error:", e); }

    if (!faceDetection) {
        console.log("BLOCKING CAPTURE: No human face detected in frame.");
        return; // EXIT: Do not save to Firebase, do not draw boxes
    }

    // --- STEP 2: VERIFY POSE CONFIDENCE (Double Check) ---
    if (!results || !results.poseLandmarks) return;
    const visibility = (results.poseLandmarks[23].visibility + results.poseLandmarks[24].visibility) / 2;
    if (visibility < 0.75) {
        console.log("BLOCKING CAPTURE: Pose visibility too low.");
        return;
    }

    // --- STEP 3: PROCEED WITH CAPTURE (Since Human is verified) ---
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = videoElement.videoWidth;
    tempCanvas.height = videoElement.videoHeight;
    const ctx = tempCanvas.getContext('2d');
    
    // Draw Mirrored Background
    ctx.save();
    ctx.translate(tempCanvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(videoElement, 0, 0);
    ctx.restore();

    // Coordinate Fix for Box
    const correctedMinX = tempCanvas.width - maxX;
    const correctedMaxX = tempCanvas.width - minX;
    const boxWidth = correctedMaxX - correctedMinX;

    // Label Positioning
    const labelHeight = 60;
    let labelY = minY - labelHeight; 
    if (labelY < 10) labelY = maxY + 10;

    // Draw Red Box & Label
    ctx.strokeStyle = 'red';
    ctx.lineWidth = 10;
    ctx.strokeRect(correctedMinX, minY, boxWidth, maxY - minY);

    ctx.fillStyle = 'red';
    ctx.fillRect(correctedMinX, labelY, 450, labelHeight);
    ctx.fillStyle = 'white';
    ctx.font = 'bold 26px Arial';
    ctx.fillText(`VIOLATION: ${distance}cm FROM LINE`, correctedMinX + 15, labelY + 40);

    // Draw Yellow Safety Line
    ctx.beginPath();
    ctx.strokeStyle = 'yellow';
    ctx.lineWidth = 12;
    window.linePoints.forEach((p, i) => {
        const lx = tempCanvas.width - ((p.x / 100) * tempCanvas.width);
        const ly = (p.y / 100) * tempCanvas.height;
        if (i === 0) ctx.moveTo(lx, ly);
        else ctx.lineTo(lx, ly);
    });
    ctx.stroke();

    const dataUrl = tempCanvas.toDataURL('image/jpeg', 0.8);
    
    // --- STEP 4: BIOMETRIC RECOGNITION (Using already detected face) ---
    let detectedRfid = "UNKNOWN_ID";
    let passengerName = "UNKNOWN";

    try {
        const { get, ref: dbRef } = await import("https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js");
        const snapshot = await get(dbRef(db, 'users'));
        if (snapshot.exists()) {
            const cloudUsers = snapshot.val();
            for (let rfid in cloudUsers) {
                const user = cloudUsers[rfid];
                if (!user.descriptors) continue;
                for (const rawDesc of Object.values(user.descriptors)) {
                    const dist = faceapi.euclideanDistance(faceDetection.descriptor, new Float32Array(Object.values(rawDesc)));
                    if ((1 - dist) * 100 > 48) { // Strict threshold for Metro Security
                        detectedRfid = rfid;
                        passengerName = user.name;
                        break;
                    }
                }
            }
        }
    } catch (e) { console.error(e); }

    // --- STEP 5: SAVE TO FIREBASE ---
    const violID = "VIOL-" + Date.now();
    const { set, ref: saveRef } = await import("https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js");
    await set(saveRef(db, 'violations/' + violID), {
        id: violID, img: dataUrl, time: new Date().toLocaleString(),
        linkedRfid: detectedRfid, status: "PENDING",
        violationDistance: distance + "cm", identifiedName: passengerName
    });
};
    // --- 6. INITIALIZATION ---
    pointCountInput.onchange = updateSliders;
    updateSliders();

    startBtn.onclick = () => {
        isMonitoring = !isMonitoring;
        startBtn.innerText = isMonitoring ? "STOP MONITORING" : "LOCK & START MONITORING";
        startBtn.classList.toggle('active');
    };
