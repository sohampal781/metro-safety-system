<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Metro Platform Safety System</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#cameraContainer{
position:relative;
width:640px;
height:480px;
margin:auto;
}

video,canvas{
position:absolute;
top:0;
left:0;
}

canvas{pointer-events:none;}

button{
padding:8px;
margin:5px;
cursor:pointer;
}

.statusSafe{color:lightgreen;}
.statusBreach{color:red;font-weight:bold;}

.record{
border:2px solid red;
margin:10px;
padding:10px;
}

</style>
</head>

<body>

<h2>Metro Virtual Yellow Line Monitoring</h2>

<button onclick="showTab('monitor')">Monitoring</button>
<button onclick="showTab('fine')">Fine Tab</button>

<div id="monitorTab">

<div id="cameraContainer">

<video id="video" width="640" height="480" autoplay muted></video>

<canvas id="canvas" width="640" height="480"></canvas>

</div>

<br>

Points:

<input type="number" id="numPoints" min="2" max="10" value="3">

<button onclick="createSliders()">Create</button>

<div id="sliders"></div>

<br>

Safe Side:

<select id="safeSide">

<option value="left">Left Safe</option>

<option value="right">Right Safe</option>

</select>

<button onclick="startSystem()">START</button>

<h3 id="status">Config Mode</h3>

</div>

<div id="fineTab" style="display:none">

<h2>Violation Records</h2>

<div id="fineContainer"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

const statusText=document.getElementById("status");

let curvePoints=[];
let monitoring=false;
let cooldown=false;
let stayStart=null;

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>video.srcObject=stream);

function showTab(tab){

monitorTab.style.display=
tab=="monitor"?"block":"none";

fineTab.style.display=
tab=="fine"?"block":"none";

}

function createSliders(){

curvePoints=[];

sliders.innerHTML="";

let n=numPoints.value;

for(let i=0;i<n;i++){

let x=document.createElement("input");

x.type="range";
x.min=0;
x.max=640;
x.value=100+i*100;

let y=document.createElement("input");

y.type="range";
y.min=0;
y.max=480;
y.value=250;

x.oninput=drawLine;
y.oninput=drawLine;

sliders.append("P"+(i+1),x,y,document.createElement("br"));

curvePoints.push({x,y});

}

drawLine();

}

function startSystem(){

monitoring=true;

statusText.innerHTML="Monitoring";

}

function drawLine(){

ctx.clearRect(0,0,640,480);

ctx.beginPath();

ctx.strokeStyle="yellow";

ctx.lineWidth=4;

ctx.moveTo(curvePoints[0].x.value,curvePoints[0].y.value);

for(let p of curvePoints){

ctx.lineTo(p.x.value,p.y.value);

}

ctx.stroke();

}

function unsafe(px,py){

let poly=[];

for(let p of curvePoints)

poly.push([+p.x.value,+p.y.value]);

if(safeSide.value=="left"){

poly.push([0,480],[0,0]);

}
else{

poly.push([640,480],[640,0]);

}

return inside([px,py],poly);

}

function inside(p,vs){

let x=p[0],y=p[1],inside=false;

for(let i=0,j=vs.length-1;i<vs.length;j=i++){

let xi=vs[i][0],yi=vs[i][1];
let xj=vs[j][0],yj=vs[j][1];

let intersect=((yi>y)!=(yj>y))
&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi);

if(intersect)inside=!inside;

}

return inside;

}

function capture(){

if(cooldown)return;

cooldown=true;

let c=document.createElement("canvas");

c.width=640;
c.height=480;

c.getContext("2d").drawImage(video,0,0);

let img=c.toDataURL();

addRecord(img);

setTimeout(()=>cooldown=false,3000);

}

function addRecord(img){

let d=document.createElement("div");

d.className="record";

let image=document.createElement("img");

image.src=img;
image.width=200;

let t=document.createElement("p");

t.innerHTML=new Date().toLocaleString();

let del=document.createElement("button");

del.innerHTML="Delete";

del.onclick=()=>d.remove();

let down=document.createElement("button");

down.innerHTML="Download";

down.onclick=()=>{

let a=document.createElement("a");

a.href=img;

a.download="breach.png";

a.click();

}

d.append(image,t,del,down);

fineContainer.prepend(d);

showTab("fine");

}

const pose=new Pose({

locateFile:f=>
`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}`

});

pose.setOptions({

modelComplexity:0,

minDetectionConfidence:0.5,

minTrackingConfidence:0.5

});

pose.onResults(r=>{

drawLine();

if(!monitoring)return;

if(r.poseLandmarks){

let l=r.poseLandmarks[23];
let rr=r.poseLandmarks[24];

let px=(l.x+rr.x)/2*640;
let py=(l.y+rr.y)/2*480;

ctx.beginPath();

ctx.arc(px,py,10,0,6.28);

ctx.fillStyle="cyan";

ctx.fill();

if(unsafe(px,py)){

statusText.innerHTML="BREACH";

statusText.className="statusBreach";

if(!stayStart)
stayStart=Date.now();

if(Date.now()-stayStart>1500){

capture();

stayStart=null;

}

}
else{

statusText.innerHTML="SAFE";

statusText.className="statusSafe";

stayStart=null;

}

}

});

const cam=new Camera(video,{

onFrame:async()=>{

await pose.send({image:video});

}

});

cam.start();

createSliders();

</script>

</body>
</html>
