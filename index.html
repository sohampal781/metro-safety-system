<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroGuard Pro | Safety Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        :root {
            --accent: #00d2ff;
            --danger: #ff3333;
            --success: #00e676;
            --bg: #0a0b10;
            --panel: #161b22;
            --border: #30363d;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #e6edf3;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 380px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            z-index: 100;
        }

        .tabs {
            display: flex;
            background: #0d1117;
            padding: 10px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }

        .content-area { padding: 20px; overflow-y: auto; flex-grow: 1; }

        /* --- UI COMPONENTS --- */
        .status-card {
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            text-transform: uppercase;
        }

        .status-safe { background: rgba(0, 230, 118, 0.1); color: var(--success); border-color: var(--success); }
        .status-breach { background: rgba(255, 51, 51, 0.1); color: var(--danger); border-color: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .control-group { 
            background: #0d1117; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border);
        }

        label { font-size: 11px; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 8px; }

        input, select, button {
            width: 100%; box-sizing: border-box; padding: 12px; background: #161b22; 
            border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 14px;
        }

        .action-btn {
            background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; margin-top: 10px;
        }

        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- VIEWPORT --- */
        #viewport {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, canvas {
            position: absolute;
            width: 95%; height: 90%;
            object-fit: contain;
            border-radius: 12px;
            transform: scaleX(-1);
        }

        /* --- LOGS --- */
        #fine-tab {
            width: 320px;
            background: var(--panel);
            border-left: 1px solid var(--border);
            padding: 15px;
            overflow-y: auto;
        }

        .violation-card {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
        }

        .violation-card img { width: 100%; border-radius: 4px; margin-bottom: 8px; }

        .angle-status {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;
        }
        .angle-box {
            padding: 8px; font-size: 10px; text-align: center; background: #21262d; border-radius: 4px;
        }
        .angle-box.done { background: var(--success); color: black; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="tabs">
            <button id="tab-mon" class="tab-btn active" onclick="switchUI('monitor')">MONITOR</button>
            <button id="tab-reg" class="tab-btn" onclick="switchUI('register')">REGISTER</button>
        </div>

        <div id="monitor-ui" class="content-area">
            <div id="status-display" class="status-card status-safe">SYSTEM READY</div>
            
            <div class="control-group">
                <label>Safety Line Precision</label>
                <input type="number" id="point-count" min="2" max="10" value="3">
            </div>

            <div class="control-group">
                <label>Platform Orientation</label>
                <select id="safe-side">
                    <option value="left">Safe on Left</option>
                    <option value="right">Safe on Right</option>
                </select>
            </div>

            <div id="slider-container"></div>
            <button id="start-btn" class="action-btn">ENGAGE MONITORING</button>
        </div>

        <div id="register-ui" class="content-area" style="display:none;">
            <h3>New Enrollment</h3>
            <div class="control-group">
                <input type="text" id="reg-name" placeholder="Full Name" style="margin-bottom: 10px;">
                <input type="text" id="reg-mobile" placeholder="Mobile Number">
            </div>

            <div class="control-group">
                <label>Auto-Face Capture Status</label>
                <div class="angle-status">
                    <div id="a0" class="angle-box">FRONT</div>
                    <div id="a1" class="angle-box">LEFT</div>
                    <div id="a2" class="angle-box">RIGHT</div>
                    <div id="a3" class="angle-box">UP/DOWN</div>
                </div>
            </div>

            <button id="save-reg-btn" class="action-btn" onclick="saveRegistration()">FINALIZE REGISTRATION</button>
        </div>
    </div>

    <div id="viewport">
        <video id="input-video" autoplay muted playsinline></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <div id="fine-tab">
        <h4 style="margin-top:0; color: var(--accent);">VIOLATION FEED</h4>
        <div id="violation-list"></div>
    </div>

    <script>
        // --- CORE VARIABLES ---
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const sliderContainer = document.getElementById('slider-container');
        const pointCountInput = document.getElementById('point-count');
        const startBtn = document.getElementById('start-btn');
        const statusDisplay = document.getElementById('status-display');
        const violationList = document.getElementById('violation-list');

        let isMonitoring = false;
        let linePoints = [];
        let breachStartTime = null;
        let capturedDescriptors = [];
        const BREACH_THRESHOLD = 1500;

        // --- UI LOGIC ---
        function switchUI(mode) {
            document.getElementById('monitor-ui').style.display = mode === 'monitor' ? 'block' : 'none';
            document.getElementById('register-ui').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('tab-mon').classList.toggle('active', mode === 'monitor');
            document.getElementById('tab-reg').classList.toggle('active', mode === 'register');
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        }

        function updateSliders() {
            if (isMonitoring) return;
            sliderContainer.innerHTML = '';
            linePoints = [];
            const count = parseInt(pointCountInput.value);
            for (let i = 0; i < count; i++) {
                const x = (i / (count - 1)) * 100;
                const y = 80;
                linePoints.push({ x, y });
                const div = document.createElement('div');
                div.className = 'control-group';
                div.innerHTML = `<label>Node ${i+1} Pos</label>
                    <input type="range" data-idx="${i}" data-axis="x" value="${x}">
                    <input type="range" data-idx="${i}" data-axis="y" value="${y}">`;
                sliderContainer.appendChild(div);
            }
        }
        pointCountInput.onchange = updateSliders;
        updateSliders();

        sliderContainer.oninput = (e) => {
            const idx = e.target.dataset.idx;
            const axis = e.target.dataset.axis;
            linePoints[idx][axis] = parseFloat(e.target.value);
        };

        // --- AI INITIALIZATION ---
        const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

        async function loadModels() {
            const URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await faceapi.nets.ssdMobilenetv1.loadFromUri(URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(URL);
        }
        loadModels();

        // --- MAIN PROCESSING LOOP ---
        pose.onResults((results) => {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            // 1. MONITORING LOGIC
            if (document.getElementById('monitor-ui').style.display !== 'none') {
                drawSafetyLine();
                if (results.poseLandmarks && isMonitoring) {
                    checkSafetyBreach(results.poseLandmarks);
                }
            } 
            
            // 2. AUTO-REGISTRATION LOGIC (Runs only in Register Tab)
            else if (document.getElementById('register-ui').style.display !== 'none') {
                autoCaptureLogic();
            }
        });

        function drawSafetyLine() {
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = 'yellow';
            canvasCtx.lineWidth = 10;
            linePoints.forEach((p, i) => {
                const cx = (p.x / 100) * canvasElement.width;
                const cy = (p.y / 100) * canvasElement.height;
                if (i === 0) canvasCtx.moveTo(cx, cy); else canvasCtx.lineTo(cx, cy);
            });
            canvasCtx.stroke();
        }

        function checkSafetyBreach(landmarks) {
            const hip = landmarks[23]; 
            const px = hip.x * 100;
            const py = hip.y * 100;
            
            // Simplified side detection based on segment
            const side = (px - linePoints[0].x) * (linePoints[linePoints.length-1].y - linePoints[0].y) - 
                         (py - linePoints[0].y) * (linePoints[linePoints.length-1].x - linePoints[0].x);
            
            const safeConfig = document.getElementById('safe-side').value;
            const isBreached = safeConfig === 'left' ? side > 0 : side < 0;

            if (isBreached) {
                if (!breachStartTime) breachStartTime = Date.now();
                const elapsed = Date.now() - breachStartTime;
                statusDisplay.innerText = `DANGER: BREACH (${(elapsed/1000).toFixed(1)}s)`;
                statusDisplay.className = "status-card status-breach";
                if (elapsed > BREACH_THRESHOLD) {
                    triggerViolationCapture();
                    breachStartTime = Date.now() + 5000;
                }
            } else {
                breachStartTime = null;
                statusDisplay.innerText = "PLATFORM SAFE";
                statusDisplay.className = "status-card status-safe";
            }
        }

        // --- AUTOMATED REGISTRATION (NO BUTTONS) ---
        async function autoCaptureLogic() {
            if (capturedDescriptors.length >= 4) return;
            
            const det = await faceapi.detectSingleFace(videoElement).withFaceLandmarks().withFaceDescriptor();
            if (!det) return;

            // Check uniqueness
            let isTooSimilar = false;
            for (let existing of capturedDescriptors) {
                if (faceapi.euclideanDistance(det.descriptor, existing) < 0.25) {
                    isTooSimilar = true;
                    break;
                }
            }

            if (!isTooSimilar) {
                const currentIdx = capturedDescriptors.length;
                capturedDescriptors.push(det.descriptor);
                const box = document.getElementById(`a${currentIdx}`);
                box.className = "angle-box done";
                box.innerText = "CAPTURED";
            }
        }

        function saveRegistration() {
            const name = document.getElementById('reg-name').value;
            const mobile = document.getElementById('reg-mobile').value;
            if (!name || capturedDescriptors.length < 4) return alert("Please provide name and allow 4 angle captures.");

            const rfid = "METRO-" + Math.floor(Math.random() * 90000 + 10000);
            const data = { name, mobile, face: Array.from(capturedDescriptors[0]) };
            localStorage.setItem(rfid, JSON.stringify(data));
            
            alert(`SUCCESS!\nPerson: ${name}\nGenerated RFID: ${rfid}`);
            location.reload();
        }

        // --- VIOLATION & AUTO-MATCHING ---
        function triggerViolationCapture() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = videoElement.videoWidth;
            tempCanvas.height = videoElement.videoHeight;
            const ctx = tempCanvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0);
            const dataUrl = tempCanvas.toDataURL('image/jpeg');

            const card = document.createElement('div');
            card.className = 'violation-card';
            card.innerHTML = `
                <img src="${dataUrl}">
                <div style="font-size:11px; margin-bottom:10px;">Breach @ ${new Date().toLocaleTimeString()}</div>
                <button class="action-btn" style="font-size:10px; padding:5px;" onclick="autoMatchViolation('${dataUrl}')">IDENTIFY & FINE</button>
            `;
            violationList.prepend(card);
        }

        async function autoMatchViolation(imgUrl) {
            const img = await faceapi.fetchImage(imgUrl);
            const det = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
            if (!det) return alert("Face not clear in capture!");

            let bestMatch = { score: 0, rfid: null, data: null };

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (!key.startsWith("METRO-")) continue;
                
                const user = JSON.parse(localStorage.getItem(key));
                const distance = faceapi.euclideanDistance(det.descriptor, new Float32Array(user.face));
                const match = (1 - distance) * 100;

                if (match > bestMatch.score) {
                    bestMatch = { score: match, rfid: key, data: user };
                }
            }

            if (bestMatch.score >= 85) {
                alert(`MATCH CONFIRMED (${bestMatch.score.toFixed(1)}%)\nUser: ${bestMatch.data.name}\nRFID: ${bestMatch.rfid}\n\nSMS Alert sent to ${bestMatch.data.mobile}`);
            } else {
                alert(`No Match Found (Highest: ${bestMatch.score.toFixed(1)}%). Manual verification needed.`);
            }
        }

        startBtn.onclick = () => {
            isMonitoring = !isMonitoring;
            startBtn.innerText = isMonitoring ? "DISENGAGE SYSTEM" : "ENGAGE MONITORING";
            startBtn.style.background = isMonitoring ? "var(--danger)" : "var(--accent)";
        };

        async function init() {
            const camera = new Camera(videoElement, {
                onFrame: async () => { await pose.send({image: videoElement}); },
                width: 1280, height: 720
            });
            camera.start();
        }
        init();
    </script>
</body>
</html>
