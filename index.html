<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroGuard Pro | Safety Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <style>
        :root {
            --accent: #00d2ff;
            --danger: #ff3333;
            --success: #00e676;
            --bg: #0a0b10;
            --panel: #161b22;
            --border: #30363d;
            --police-blue: #1a237e;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: #e6edf3;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        #sidebar {
            width: 380px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 0;
            z-index: 100;
        }

        .tabs {
            display: flex;
            background: #0d1117;
            padding: 10px;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #8b949e;
            cursor: pointer;
            font-weight: 600;
            border-radius: 6px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent);
            color: #000;
        }

        .content-area { padding: 20px; overflow-y: auto; flex-grow: 1; }

        /* --- UI COMPONENTS --- */
        .status-card {
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            font-size: 20px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            text-transform: uppercase;
        }

        .status-safe { background: rgba(0, 230, 118, 0.1); color: var(--success); border-color: var(--success); }
        .status-breach { background: rgba(255, 51, 51, 0.1); color: var(--danger); border-color: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .control-group { 
            background: #0d1117; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border);
        }

        label { font-size: 11px; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 8px; }

        input, select, button {
            width: 100%; box-sizing: border-box; padding: 12px; background: #161b22; 
            border: 1px solid var(--border); color: white; border-radius: 6px; font-size: 14px;
        }

        .action-btn {
            background: var(--accent); color: black; font-weight: bold; border: none; cursor: pointer; margin-top: 10px;
        }

        .delete-btn {
            background: #ff4444; color: white; font-size: 10px; padding: 5px; margin-top: 5px; border: none; border-radius: 4px; cursor: pointer;
        }

        /* --- VIEWPORT --- */
        #viewport {
            flex-grow: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video, canvas {
            position: absolute;
            width: 95%; height: 90%;
            object-fit: contain;
            border-radius: 12px;
            transform: scaleX(-1);
        }

        /* --- CHALLAN TAB OVERLAY --- */
        #challan-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 500;
            display: none;
            padding: 40px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .challan-header {
            border-bottom: 2px solid var(--police-blue);
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .challan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .challan-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            border-top: 5px solid var(--danger);
        }

        .challan-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }

        .angle-status {
            display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;
        }
        .angle-box {
            padding: 8px; font-size: 10px; text-align: center; background: #21262d; border-radius: 4px;
        }
        .angle-box.done { background: var(--success); color: black; }
    </style>
</head>
<body>

    <div id="sidebar">
    <div class="tabs" style="display:flex; gap:5px; margin-bottom:15px;">
        <button onclick="switchUI('monitor')" class="tab-btn active" id="tab-mon">MONITOR</button>
        <button onclick="switchUI('register')" class="tab-btn" id="tab-reg">REGISTER</button>
        <button onclick="switchUI('challan')" class="tab-btn" id="tab-cha">PORTAL</button>
    </div>

    <div id="status-display" class="status-card status-safe">SYSTEM READY</div>

    <div id="monitor-ui">
        <div class="control-group">
            <label>Points on Yellow Line (2-10)</label>
            <input type="number" id="point-count" min="2" max="10" value="3">
        </div>
        <div class="control-group">
            <label>Safe Side Orientation</label>
            <select id="safe-side">
                <option value="left">Left of Line</option>
                <option value="right">Right of Line</option>
            </select>
        </div>
        <div id="slider-container"></div>
        <button id="start-btn">LOCK & START MONITORING</button>
    </div>

    <div id="register-ui" style="display:none;">
        <div class="control-group">
            <input type="text" id="reg-name" placeholder="Full Name">
            <input type="text" id="reg-mobile" placeholder="Mobile Number" style="margin-top:10px;">
        </div>
        <button class="action-btn" onclick="startSecureCapture()">START CAPTURE</button>
        <div class="angle-status" style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px;">
            <div id="a0" class="angle-box">FRONT</div>
            <div id="a1" class="angle-box">LEFT</div>
            <div id="a2" class="angle-box">RIGHT</div>
            <div id="a3" class="angle-box">UP/DOWN</div>
        </div>
        <button class="action-btn" onclick="saveRegistration()" style="background:var(--safe); margin-top:10px;">FINALIZE ENROLLMENT</button>
        <div id="db-items" style="margin-top:15px; font-size:11px;"></div>
    </div>
</div>

    <div id="viewport">
        <video id="input-video" autoplay muted playsinline></video>
        <canvas id="output-canvas"></canvas>

        <div id="challan-overlay">
            <div class="challan-header">
                <h1>METRO POLICE E-CHALLAN SYSTEM</h1>
                <button class="action-btn" style="width:100px; margin:0;" onclick="switchUI('monitor')">CLOSE</button>
            </div>
            <div id="challan-grid" class="challan-grid"></div>
        </div>
    </div>

    <div id="fine-tab" style="display:none;">
        <h4 style="margin-top:0; color: var(--accent);">VIOLATION FEED</h4>
        <div id="violation-list"></div>
    </div>
    <script>
    // --- 1. CORE SYSTEM VARIABLES ---
    const videoElement = document.getElementById('input-video');
    const canvasElement = document.getElementById('output-canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const sliderContainer = document.getElementById('slider-container');
    const pointCountInput = document.getElementById('point-count');
    const startBtn = document.getElementById('start-btn');
    const statusDisplay = document.getElementById('status-display');
    const violationList = document.getElementById('violation-list');

    let isMonitoring = false;
    let linePoints = [];
    let breachStartTime = null;
    const BREACH_THRESHOLD = 1500; 

    // Enrollment & Capture State
    let isCapturing = false;
    let captureStep = 0;
    let capturedDescriptors = [];
    let tempCapturedImages = [];
    const commands = ["LOOK STRAIGHT (FRONT)", "TURN HEAD LEFT", "TURN HEAD RIGHT", "LOOK UP / DOWN"];

    function switchUI(mode) {
    // Hide all main UI sections
    document.getElementById('monitor-ui').style.display = mode === 'monitor' ? 'block' : 'none';
    document.getElementById('register-ui').style.display = mode === 'register' ? 'block' : 'none';
    document.getElementById('challan-overlay').style.display = mode === 'challan' ? 'block' : 'none';
    
    // Toggle active state on buttons
    document.getElementById('tab-mon').classList.toggle('active', mode === 'monitor');
    document.getElementById('tab-reg').classList.toggle('active', mode === 'register');
    document.getElementById('tab-cha').classList.toggle('active', mode === 'challan');
    
    // Refresh lists
    if(mode === 'challan') renderChallans();
    if(mode === 'register') renderUserList();
}
async function judgeViolation(key) {
    currentActiveViolationKey = key; 
    const violData = JSON.parse(localStorage.getItem(key));
    
    // Open terminal and show evidence
    document.getElementById('judgement-modal').style.display = 'block';
    document.getElementById('modal-violation-img').src = violData.img;
    
    const aiPred = document.getElementById('ai-prediction');
    const rfidInput = document.getElementById('manual-rfid-input');
    
    // AUTO-FILL the RFID captured during the breach
    if (violData.linkedRfid && violData.linkedRfid !== "UNKNOWN_ID") {
        rfidInput.value = violData.linkedRfid;
        rfidInput.style.border = "2px solid var(--success)";
        aiPred.innerHTML = "MATCH FOUND IN DATABASE";
        fetchRegistrationData(); // Automatically show name and photo
    } else {
        rfidInput.value = "";
        rfidInput.placeholder = "NO AUTO-MATCH: ENTER MANUALLY";
        aiPred.innerHTML = "ID NOT DETECTED AUTOMATICALLY";
    }
}
       function fetchRegistrationData() {
    const inputRfid = document.getElementById('manual-rfid-input').value.trim();
    const userRaw = localStorage.getItem(inputRfid);
    
    if (!userRaw) {
        alert("RFID NOT REGISTERED");
        return;
    }

    const user = JSON.parse(userRaw);
    const display = document.getElementById('registration-display');
    const grid = document.getElementById('reg-photos-grid');
    
    display.style.display = 'block';
    // Show the first photo taken during registration
    grid.innerHTML = `
        <div style="text-align:center">
            <label style="color:var(--success)">OFFICIAL REGISTRATION PHOTO</label>
            <img src="${user.regImages[0]}" style="width:100%; border:3px solid var(--success); border-radius:10px; margin-top:5px;">
        </div>
    `;
    document.getElementById('reg-user-info').innerHTML = `
        <h3 style="margin:10px 0 5px 0">${user.name}</h3>
        <p style="color:var(--accent)">PH: ${user.mobile}</p>
    `;
}
function finalizeFine() {
    const rfid = document.getElementById('manual-rfid-input').value.trim();
    const userRaw = localStorage.getItem(rfid);
    const amount = prompt("ENTER FINE AMOUNT (INR):", "500");

    if (amount && userRaw && currentActiveViolationKey) {
        const user = JSON.parse(userRaw);
        
        // 1. Get the current violation data
        const violData = JSON.parse(localStorage.getItem(currentActiveViolationKey));
        
        // 2. Add the status 'FINED'
        violData.status = "FINED";
        violData.fineAmount = amount;
        violData.finedUser = user.name;

        // 3. Save it back to localStorage
        localStorage.setItem(currentActiveViolationKey, JSON.stringify(violData));

        alert(`SUCCESS: ₹${amount} Challan issued to ${user.name}`);
        
        closeJudgement();
        renderChallans(); // Refresh to show the updated status
    }
}
function closeJudgement() {
    document.getElementById('judgement-modal').style.display = 'none';
    document.getElementById('registration-display').style.display = 'none';
}
        function deleteRecord(key) {
    if(confirm("PERMANENTLY DELETE INCIDENT LOG?")) {
        localStorage.removeItem(key);
        // Refresh whichever UI is currently visible
        renderChallans(); 
        renderUserList();
    }
}
       function renderChallans() {
    const grid = document.getElementById('challan-grid');
    grid.innerHTML = "";

    Object.keys(localStorage).forEach(key => {
        if(key.startsWith("VIOL-")) {
            const viol = JSON.parse(localStorage.getItem(key));
            const card = document.createElement('div');
            card.className = 'challan-card';
            const isFined = viol.status === "FINED";
            
            card.innerHTML = `
                <img src="${viol.img}" style="width:100%; border-radius:8px;">
                <div style="font-size:12px; margin: 10px 0; color: #fff;">
                    <span style="color:var(--accent); font-weight:bold;">RFID: ${viol.linkedRfid}</span><br>
                    Time: ${viol.time}
                </div>
                ${isFined ? 
                    `<button class="action-btn" style="background:var(--success); color:black;" disabled>CHALLAN ISSUED</button>` : 
                    `<button class="action-btn" onclick="judgeViolation('${key}')">VERIFY & FINE</button>`
                }
                <button class="delete-btn" style="width:100%" onclick="deleteRecord('${key}')">DELETE LOG</button>
            `;
            grid.prepend(card);
        }
    });
}
function deleteRecord(key) {
    console.log("Attempting to delete key:", key);
    if(confirm("Delete this evidence?")) {
        localStorage.removeItem(key);
        renderChallans(); // Re-draw the list
    }
}
    // --- 3. MONITORING & MATH LOGIC (YOUR ORIGINAL LOGIC) ---
    function updateSliders() {
        if (isMonitoring) return;
        sliderContainer.innerHTML = '';
        linePoints = [];
        const count = parseInt(pointCountInput.value);
        
        for (let i = 0; i < count; i++) {
            const x = (i / (count - 1)) * 100;
            const y = 80; 
            linePoints.push({ x, y });

            const div = document.createElement('div');
            div.className = 'control-group';
            div.innerHTML = `
                <label>Point ${i+1} Pos</label>
                <input type="range" data-idx="${i}" data-axis="x" value="${x}">
                <input type="range" data-idx="${i}" data-axis="y" value="${y}">
            `;
            sliderContainer.appendChild(div);
        }
    }

    sliderContainer.addEventListener('input', (e) => {
        const idx = e.target.dataset.idx;
        const axis = e.target.dataset.axis;
        linePoints[idx][axis] = parseFloat(e.target.value);
    });

    // Cross-product side detection
    function getSide(px, py, x1, y1, x2, y2) {
        return (px - x1) * (y2 - y1) - (py - y1) * (x2 - x1);
    }

    const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

    pose.onResults((results) => {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;

        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        // Draw the Yellow Safety Line
        canvasCtx.beginPath();
        canvasCtx.strokeStyle = 'yellow';
        canvasCtx.lineWidth = 8;
        linePoints.forEach((p, i) => {
            const cx = (p.x / 100) * canvasElement.width;
            const cy = (p.y / 100) * canvasElement.height;
            if (i === 0) canvasCtx.moveTo(cx, cy);
            else canvasCtx.lineTo(cx, cy);
        });
        canvasCtx.stroke();

        if (results.poseLandmarks && isMonitoring) {
            const leftHip = results.poseLandmarks[23];
            const rightHip = results.poseLandmarks[24];
            const centerX = ((leftHip.x + rightHip.x) / 2) * 100;
            const centerY = ((leftHip.y + rightHip.y) / 2) * 100;

            // Detect active line segment based on person's X position
            let segmentIdx = 0;
            for(let i=0; i < linePoints.length - 1; i++) {
                if(centerX >= Math.min(linePoints[i].x, linePoints[i+1].x) && 
                   centerX <= Math.max(linePoints[i].x, linePoints[i+1].x)) {
                    segmentIdx = i;
                    break;
                }
            }

            const p1 = linePoints[segmentIdx];
            const p2 = linePoints[segmentIdx + 1] || p1;
            const side = getSide(centerX, centerY, p1.x, p1.y, p2.x, p2.y);
            const safeConfig = document.getElementById('safe-side').value;

            // Detect Breach based on Safe Side Orientation
            const isBreached = safeConfig === 'left' ? side > 0 : side < 0;

            if (isBreached) {
                if (!breachStartTime) breachStartTime = Date.now();
                const elapsed = Date.now() - breachStartTime;
                statusDisplay.innerText = `BREACH: ${(elapsed/1000).toFixed(1)}s`;
                statusDisplay.className = "status-card status-breach";
                if (elapsed > BREACH_THRESHOLD) {
                    captureViolation();
                    breachStartTime = Date.now() + 5000; // Cooldown
                }
            } else {
                breachStartTime = null;
                statusDisplay.innerText = "SAFE";
                statusDisplay.className = "status-card status-safe";
            }
        }
    });

    // --- 4. ENROLLMENT & DATABASE FUNCTIONS ---
    async function startSecureCapture() {
        if (isCapturing) return;
        capturedDescriptors = [];
        tempCapturedImages = [];
        captureStep = 0;
        isCapturing = true;
        document.querySelectorAll('.angle-box').forEach(b => b.className = 'angle-box');
        runCaptureSequence();
    }

    async function runCaptureSequence() {
    if (captureStep >= 4) {
        isCapturing = false;
        statusDisplay.innerText = "CAPTURES COMPLETE";
        statusDisplay.className = "status-card status-safe";
        return;
    }

    statusDisplay.innerText = commands[captureStep];
    statusDisplay.className = "status-card status-breach"; // Use breach color to highlight action

    // Give user time to pose
    await new Promise(r => setTimeout(r, 2500));

    // Try to detect face
    const det = await faceapi.detectSingleFace(videoElement)
        .withFaceLandmarks()
        .withFaceDescriptor();

    if (det) {
        capturedDescriptors.push(Array.from(det.descriptor));
        
        // Save the frame for visual confirmation
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = videoElement.videoWidth;
        tempCanvas.height = videoElement.videoHeight;
        const ctx = tempCanvas.getContext('2d');
        ctx.drawImage(videoElement, 0, 0);
        tempCapturedImages.push(tempCanvas.toDataURL('image/jpeg'));

        document.getElementById(`a${captureStep}`).className = "angle-box done";
        captureStep++;
        runCaptureSequence(); // Move to next step
    } else {
        statusDisplay.innerText = "FACE NOT DETECTED - RETRYING...";
        setTimeout(runCaptureSequence, 1000); // Retry current step
    }
}

    function saveRegistration() {
        const name = document.getElementById('reg-name').value;
        const mobile = document.getElementById('reg-mobile').value;

        if (!name || !mobile || capturedDescriptors.length < 4) {
            alert("Complete all details and photos first!");
            return;
        }

        const rfid = "METRO-" + Math.random().toString(36).substr(2, 9).toUpperCase();
        const userData = {
            rfid, name, mobile,
            descriptors: capturedDescriptors.map(d => Array.from(d)),
            regImages: tempCapturedImages
        };

        localStorage.setItem(rfid, JSON.stringify(userData));
        alert("Registered: " + rfid);
        renderUserList();
    }

    function renderUserList() {
        const container = document.getElementById('db-items');
        if (!container) return;
        container.innerHTML = "";
        Object.keys(localStorage).forEach(key => {
            if(key.startsWith("METRO-")) {
                const u = JSON.parse(localStorage.getItem(key));
                container.innerHTML += `
                    <div style="padding:5px; border-bottom:1px solid #444; display:flex; justify-content:space-between;">
                        <span>${u.name}</span>
                        <span style="color:red; cursor:pointer;" onclick="deleteRecord('${key}')">✖</span>
                    </div>`;
            }
        });
    }

    function deleteRecord(key) {
        if(confirm("Delete record?")) {
            localStorage.removeItem(key);
            renderUserList();
        }
    }

    // --- 5. VIOLATION LOGGING ---
   async function captureViolation() {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = videoElement.videoWidth;
    tempCanvas.height = videoElement.videoHeight;
    const ctx = tempCanvas.getContext('2d');
    
    // 1. Capture the visual evidence (mirrored for correct orientation)
    ctx.translate(tempCanvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(videoElement, 0, 0);
    const dataUrl = tempCanvas.toDataURL('image/jpeg');

    let detectedRfid = "UNKNOWN_ID"; // Default if no match found
    let matchScore = 0;

    try {
        // 2. IMMEDIATE FACE SCAN during the breach
        const det = await faceapi.detectSingleFace(videoElement)
            .withFaceLandmarks()
            .withFaceDescriptor();

        if (det) {
            // 3. Search LocalStorage for a match
            Object.keys(localStorage).forEach(key => {
                if (key.startsWith("METRO-")) {
                    const user = JSON.parse(localStorage.getItem(key));
                    user.descriptors.forEach(desc => {
                        const dist = faceapi.euclideanDistance(det.descriptor, new Float32Array(desc));
                        const score = (1 - dist) * 100;
                        if (score > 45 && score > matchScore) {
                            matchScore = score;
                            detectedRfid = user.rfid; // THIS IS THE MANDATORY LINK
                        }
                    });
                }
            });
        }
    } catch (e) {
        console.error("Auto-Identification Error:", e);
    }

    // 4. Save the incident with the linked RFID
    const storageKey = "VIOL-" + Date.now(); 
    const violationObject = {
        id: storageKey,
        img: dataUrl, 
        time: new Date().toLocaleString(),
        linkedRfid: detectedRfid, // Storing the ID inside the violation object
        status: "PENDING"
    };

    localStorage.setItem(storageKey, JSON.stringify(violationObject));
    renderChallans(); 
}
    // --- 6. INITIALIZATION ---
    pointCountInput.onchange = updateSliders;
    updateSliders();

    startBtn.onclick = () => {
        isMonitoring = !isMonitoring;
        startBtn.innerText = isMonitoring ? "STOP MONITORING" : "LOCK & START MONITORING";
        startBtn.classList.toggle('active');
    };
        async function loadFaceModels() {
    // This URL contains the actual JSON and Shard files needed for detection
    const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
    
    try {
        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
        console.log("Face Models Loaded Successfully");
    } catch (e) {
        console.error("Model Loading Failed: ", e);
    }
}

// Update your init function
async function init() {
    await loadFaceModels(); // Add this line
    const camera = new Camera(videoElement, {
        onFrame: async () => { 
            await pose.send({image: videoElement}); 
        },
        width: 1280, height: 720
    });
    camera.start();
}
   
    init();
</script>
    <div id="judgement-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; padding:40px; box-sizing:border-box; overflow-y:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--accent); padding-bottom:10px;">
        <h2 style="color:var(--accent); margin:0;">INCIDENT VERIFICATION TERMINAL</h2>
        <button onclick="closeJudgement()" style="background:var(--danger); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">EXIT TERMINAL</button>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:30px; margin-top:20px;">
        <div class="control-group">
            <h3 style="color:var(--danger)">EVIDENCE FOOTAGE</h3>
            <img id="modal-violation-img" style="width:100%; border:2px solid var(--danger); border-radius:10px;">
            <div style="background:#000; padding:10px; margin-top:10px; border-radius:5px; text-align:center;">
                <p id="incident-time" style="font-family:monospace; color:#aaa;"></p>
                <div style="display:flex; justify-content:center; gap:10px;">
                    <button class="btn" style="width:auto; font-size:10px;">⏪ -10s FOOTAGE</button>
                    <button class="btn" style="width:auto; font-size:10px;">⏩ +10s FOOTAGE</button>
                </div>
            </div>
            <div id="ai-prediction" style="margin-top:20px; font-size:24px; text-align:center; font-weight:bold;"></div>
        </div>

        <div class="control-group">
            <h3 style="color:var(--accent)">REGISTRATION DATA MATCHING</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <input type="text" id="manual-rfid-input" placeholder="ENTER DETECTED RFID NUMBER" style="flex:1;">
                <button class="btn-main" style="width:120px;" onclick="fetchRegistrationData()">VERIFY ID</button>
            </div>

            <div id="registration-display" style="display:none;">
                <p id="reg-user-info" style="font-weight:bold; color:var(--success);"></p>
                <div id="reg-photos-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    </div>
                <button class="btn-main" style="margin-top:20px; background:var(--success)" onclick="finalizeFine()">CONFIRM & GENERATE CHALLAN</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
