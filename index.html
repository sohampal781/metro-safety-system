<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetroGuard | AI Platform Safety</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
        :root {
            --accent: #ffcc00;
            --danger: #ff4444;
            --safe: #00c851;
            --bg: #121212;
            --panel: #1e1e1e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Sidebar UI --- */
        #sidebar {
            width: 350px;
            background: var(--panel);
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .status-card {
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 2px solid #444;
        }

        .status-safe { background: rgba(0, 200, 81, 0.2); color: var(--safe); border-color: var(--safe); }
        .status-breach { background: rgba(255, 68, 68, 0.2); color: var(--danger); border-color: var(--danger); }

        .control-group { margin-bottom: 15px; background: #2a2a2a; padding: 10px; border-radius: 5px; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        
        input[type="range"] { width: 100%; accent-color: var(--accent); }
        select, button {
            width: 100%; padding: 10px; background: #333; color: white; border: 1px solid #444; border-radius: 4px; cursor: pointer;
        }

        #start-btn { background: var(--accent); color: black; font-weight: bold; margin-top: 10px; }
        #start-btn.active { background: var(--danger); color: white; }

        /* --- Main Viewport --- */
        #viewport {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video, canvas { position: absolute; width: 100%; height: 100%; object-fit: contain; }

        /* --- Fine Tab --- */
        #fine-tab {
            width: 300px;
            background: var(--panel);
            border-left: 2px solid #333;
            padding: 15px;
            overflow-y: auto;
        }

        .fine-card {
            background: #2a2a2a;
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 5px;
            font-size: 11px;
        }

        .fine-card img { width: 100%; border-radius: 3px; margin-bottom: 5px; }
        .fine-actions { display: flex; gap: 5px; margin-top: 5px; }
        .btn-small { padding: 5px; font-size: 10px; flex: 1; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>METRO GUARD AI</h2>
        <div id="status-display" class="status-card status-safe">SYSTEM READY</div>

        <div class="control-group">
            <label>Points on Yellow Line (2-10)</label>
            <input type="number" id="point-count" min="2" max="10" value="3">
        </div>

        <div class="control-group">
            <label>Safe Side Orientation</label>
            <select id="safe-side">
                <option value="left">Left of Line</option>
                <option value="right">Right of Line</option>
            </select>
        </div>

        <div id="slider-container">
            </div>

        <button id="start-btn">LOCK & START MONITORING</button>
    </div>

    <div id="viewport">
        <video id="input-video" playsinline></video>
        <canvas id="output-canvas"></canvas>
    </div>

    <div id="fine-tab">
        <h3>Violation Logs</h3>
        <div id="violation-list"></div>
    </div>

    <script>
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('output-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const sliderContainer = document.getElementById('slider-container');
        const pointCountInput = document.getElementById('point-count');
        const startBtn = document.getElementById('start-btn');
        const statusDisplay = document.getElementById('status-display');
        const violationList = document.getElementById('violation-list');

        let isMonitoring = false;
        let linePoints = [];
        let breachStartTime = null;
        const BREACH_THRESHOLD = 1500; // 1.5 Seconds

        // --- Initialize Sliders ---
        function updateSliders() {
            if (isMonitoring) return;
            sliderContainer.innerHTML = '';
            linePoints = [];
            const count = parseInt(pointCountInput.value);
            
            for (let i = 0; i < count; i++) {
                const x = (i / (count - 1)) * 100;
                const y = 50;
                linePoints.push({ x, y });

                const div = document.createElement('div');
                div.className = 'control-group';
                div.innerHTML = `
                    <label>Point ${i+1} (X, Y)</label>
                    <input type="range" data-idx="${i}" data-axis="x" value="${x}">
                    <input type="range" data-idx="${i}" data-axis="y" value="${y}">
                `;
                sliderContainer.appendChild(div);
            }
        }

        sliderContainer.addEventListener('input', (e) => {
            const idx = e.target.dataset.idx;
            const axis = e.target.dataset.axis;
            linePoints[idx][axis] = parseFloat(e.target.value);
        });

        pointCountInput.addEventListener('change', updateSliders);
        updateSliders();

        // --- Core Logic: Side Detection ---
        function getSide(px, py, x1, y1, x2, y2) {
            // Cross Product Math
            return (px - x1) * (y2 - y1) - (py - y1) * (x2 - x1);
        }

        function checkViolation(hipX, hipY) {
            // Find the segment the person is closest to horizontally
            let segmentIdx = 0;
            for(let i=0; i < linePoints.length - 1; i++) {
                if(hipX >= linePoints[i].x && hipX <= linePoints[i+1].x) {
                    segmentIdx = i;
                    break;
                }
            }

            const p1 = linePoints[segmentIdx];
            const p2 = linePoints[segmentIdx + 1] || p1;
            
            const side = getSide(hipX, hipY, p1.x, p1.y, p2.x, p2.y);
            const safeConfig = document.getElementById('safe-side').value;

            // In Canvas Y increases downwards.
            // Simplified logic: side > 0 is "one side", side < 0 is "other"
            if (safeConfig === 'left') return side < 0;
            return side > 0;
        }

        // --- MediaPipe Setup ---
        const pose = new Pose({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
        });

        pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.5 });

        pose.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Draw Virtual Line
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = 'yellow';
            canvasCtx.lineWidth = 5;
            linePoints.forEach((p, i) => {
                const cx = (p.x / 100) * canvasElement.width;
                const cy = (p.y / 100) * canvasElement.height;
                if (i === 0) canvasCtx.moveTo(cx, cy);
                else canvasCtx.lineTo(cx, cy);
            });
            canvasCtx.stroke();

            if (results.poseLandmarks && isMonitoring) {
                // Get Hips Center
                const leftHip = results.poseLandmarks[23];
                const rightHip = results.poseLandmarks[24];
                const centerX = ((leftHip.x + rightHip.x) / 2) * 100;
                const centerY = ((leftHip.y + rightHip.y) / 2) * 100;

                const isBreached = checkViolation(centerX, centerY);

                if (isBreached) {
                    if (!breachStartTime) breachStartTime = Date.now();
                    const elapsed = Date.now() - breachStartTime;

                    statusDisplay.innerText = "BREACH DETECTED";
                    statusDisplay.className = "status-card status-breach";

                    if (elapsed > BREACH_THRESHOLD) {
                        captureViolation();
                        breachStartTime = Date.now() + 10000; // Cooldown 10s
                    }
                } else {
                    breachStartTime = null;
                    statusDisplay.innerText = "SAFE";
                    statusDisplay.className = "status-card status-safe";
                }

                // Draw Hip Tracking Dot
                canvasCtx.fillStyle = isBreached ? 'red' : 'lime';
                canvasCtx.beginPath();
                canvasCtx.arc((centerX/100)*canvasElement.width, (centerY/100)*canvasElement.height, 8, 0, 2*Math.PI);
                canvasCtx.fill();
            }
            canvasCtx.restore();
        });

        function captureViolation() {
            // Draw current video frame + canvas overlay to a temp canvas
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvasElement.width;
            tempCanvas.height = canvasElement.height;
            const ctx = tempCanvas.getContext('2d');
            ctx.drawImage(videoElement, 0, 0, tempCanvas.width, tempCanvas.height);
            ctx.drawImage(canvasElement, 0, 0);

            const dataUrl = tempCanvas.toDataURL('image/jpeg');
            const timestamp = new Date().toLocaleTimeString();

            const card = document.createElement('div');
            card.className = 'fine-card';
            card.innerHTML = `
                <img src="${dataUrl}">
                <div><strong>Violation @ ${timestamp}</strong></div>
                <div class="fine-actions">
                    <button class="btn-small" onclick="this.parentElement.parentElement.remove()">Delete</button>
                    <a href="${dataUrl}" download="violation.jpg" style="flex:1"><button class="btn-small">Save</button></a>
                </div>
            `;
            violationList.prepend(card);
        }

        // --- UI Controls ---
        startBtn.onclick = () => {
            isMonitoring = !isMonitoring;
            if (isMonitoring) {
                startBtn.innerText = "STOP MONITORING";
                startBtn.classList.add('active');
                pointCountInput.disabled = true;
                sliderContainer.querySelectorAll('input').forEach(i => i.disabled = true);
            } else {
                startBtn.innerText = "LOCK & START MONITORING";
                startBtn.classList.remove('active');
                pointCountInput.disabled = false;
                sliderContainer.querySelectorAll('input').forEach(i => i.disabled = false);
            }
        };

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                await pose.send({image: videoElement});
            }
        });
        camera.start();
    </script>
</body>
</html>
